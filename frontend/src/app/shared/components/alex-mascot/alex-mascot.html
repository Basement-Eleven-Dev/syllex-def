<div class="agent-mascot-container position-relative mb-2 d-flex align-items-center justify-content-center"
     [ngClass]="'variant-' + variant">
  <div class="agent-mascot-glow"></div>
  <div class="agent-mascot-wrap">
    <svg
      class="agent-mascot-svg"
      viewBox="0 0 100 100"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
    >
      <rect
        x="20"
        y="20"
        width="60"
        height="60"
        rx="16"
        class="mascot-face-bg"
        stroke-width="2"
      />
      <circle cx="40" cy="45" r="4" fill="#ffffff" />
      <circle cx="60" cy="45" r="4" fill="#ffffff" />
      <path
        class="mascot-star"
        d="M 70 20 L 75 10 L 80 20 L 90 25 L 80 30 L 75 40 L 70 30 L 60 25 Z"
      />
    </svg>
  </div>
</div>
