<ng-container *transloco="let t; read: 'test_detail'">
@if (IsLoading()) {
<div class="d-flex justify-content-center align-items-center py-5">
  <fa-icon
    [icon]="SpinnerIcon"
    [animation]="'spin'"
    [size]="'3x'"
    class="text-primary"
  ></fa-icon>
</div>
} @else if (TestData()) {

<!-- Header -->
<app-back-to [path]="'/t/tests'" [label]="t('back')" />

<app-syllex-page-header
  [title]="TestData()!.name"
  [description]="TestData()!.availableFrom ? t('created') + (TestData()!.availableFrom | date: 'd MMM y') : ''"
>
  <app-syllex-button
    [props]="{ label: t('print'), variant: 'primary', color: 'celestine', size: 'large', leftIcon: PrintIcon }"
    (clicked)="onPrintTest()"
  />
  <app-syllex-button
    [props]="{ label: t('print_results'), variant: 'primary', color: 'celestine', size: 'large', leftIcon: PrintIcon }"
    (clicked)="onPrintResults()"
  />
  <app-syllex-button
    [props]="{ label: t('edit'), variant: 'secondary', size: 'large', leftIcon: EditIcon }"
    (clicked)="onEditTest()"
  />
  <app-syllex-button
    [props]="{ label: t('delete'), variant: 'primary', color: 'danger', size: 'large', leftIcon: TrashIcon }"
    (clicked)="onDeleteTest()"
  />
</app-syllex-page-header>

<!-- KPI -->
<div class="mt-4">
  <app-syllex-kpi-row [kpis]="TestStats()" />
</div>

<!-- Assegnazioni -->
<div class="section-heading mt-5">
  <span>{{ t('assignments') }}</span>
  <fa-icon [icon]="UsersIcon" />
</div>
<app-test-assignments [attempts]="Attempts()" />

<!-- Statistiche -->
<div class="section-heading mt-5">
  <span>{{ t('stats') }}</span>
  <fa-icon [icon]="ChartIcon" />
</div>
<div class="mb-4">
  <app-test-ai-summary [id]="TestId()!" mode="test" />
</div>
<app-test-stats
  [attempts]="Attempts()"
  [maxScore]="TestData()?.maxScore || 0"
  [classes]="Classes()"
/>

} @else {
<div class="alert alert-warning" role="alert">{{ t('not_found') }}</div>
}
</ng-container>
