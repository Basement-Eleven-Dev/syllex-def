@if (IsLoading()) {
<div class="d-flex justify-content-center align-items-center py-5">
  <fa-icon
    [icon]="SpinnerIcon"
    [animation]="'spin'"
    [size]="'3x'"
    class="text-primary"
  ></fa-icon>
</div>
} @else if (TestData()) {

<!-- Header -->
<div class="class-header">
  <button class="back-btn" [routerLink]="'/t/tests'" aria-label="Torna ai test">
    <fa-icon [icon]="ArrowLeftIcon" />
  </button>
  <span class="class-header__title">{{ TestData()!.name }}</span>
  <div class="ms-auto d-flex flex-row gap-2 align-items-center">
    <button
      class="btn btn-sm btn-outline-secondary icon-btn"
      (click)="onPrintTest()"
    >
      <fa-icon [icon]="PrintIcon"></fa-icon> Stampa / PDF
    </button>
    <button
      class="btn btn-sm btn-outline-secondary icon-btn"
      (click)="onPrintResults()"
    >
      <fa-icon [icon]="PrintIcon"></fa-icon> Stampa risultati
    </button>
    <button
      class="btn btn-sm btn-outline-primary icon-btn"
      (click)="onEditTest()"
    >
      <fa-icon [icon]="EditIcon"></fa-icon> Modifica
    </button>
    <button
      class="btn btn-sm btn-outline-danger icon-btn"
      (click)="onDeleteTest()"
    >
      <fa-icon [icon]="TrashIcon"></fa-icon> Elimina
    </button>
  </div>
</div>

@if (TestData()!.availableFrom) {
<p class="text-muted mb-0 mt-1">
  Creato il {{ TestData()!.availableFrom | date: 'd MMM y' }}
</p>
}

<!-- KPI -->
<div class="mt-4">
  <app-syllex-kpi-row [kpis]="TestStats()" />
</div>

<!-- Assegnazioni -->
<div class="section-heading mt-5">
  <span>Assegnazioni</span>
  <fa-icon [icon]="UsersIcon" />
</div>
<app-test-assignments [attempts]="Attempts()" />

<!-- Statistiche -->
<div class="section-heading mt-5">
  <span>Statistiche</span>
  <fa-icon [icon]="ChartIcon" />
</div>
<div class="mb-4">
  <app-test-ai-summary [id]="TestId()!" mode="test" />
</div>
<app-test-stats
  [attempts]="Attempts()"
  [maxScore]="TestData()?.maxScore || 0"
/>

} @else {
<div class="alert alert-warning" role="alert">Test non trovato</div>
}
