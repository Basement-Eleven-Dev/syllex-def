@if (IsLoading()) {
<div class="d-flex justify-content-center align-items-center py-5">
  <fa-icon
    [icon]="SpinnerIcon"
    [animation]="'spin'"
    [size]="'3x'"
    class="text-primary"
  ></fa-icon>
</div>
} @else if (TestData()) {

<!-- Header -->
<app-back-to [path]="'/t/tests'" label="Torna ai test" />

<app-syllex-page-header
  [title]="TestData()!.name"
  [description]="TestData()!.availableFrom ? 'Creato il ' + (TestData()!.availableFrom | date: 'd MMM y') : ''"
>
  <app-syllex-button
    [props]="{ label: 'Stampa / PDF', variant: 'primary', color: 'celestine', size: 'large', leftIcon: PrintIcon }"
    (clicked)="onPrintTest()"
  />
  <app-syllex-button
    [props]="{ label: 'Stampa Risultati', variant: 'primary', color: 'celestine', size: 'large', leftIcon: PrintIcon }"
    (clicked)="onPrintResults()"
  />
  <app-syllex-button
    [props]="{ label: 'Modifica', variant: 'secondary', size: 'large', leftIcon: EditIcon }"
    (clicked)="onEditTest()"
  />
  <app-syllex-button
    [props]="{ label: 'Elimina', variant: 'primary', color: 'danger', size: 'large', leftIcon: TrashIcon }"
    (clicked)="onDeleteTest()"
  />
</app-syllex-page-header>

<!-- KPI -->
<div class="mt-4">
  <app-syllex-kpi-row [kpis]="TestStats()" />
</div>

<!-- Assegnazioni -->
<div class="section-heading mt-5">
  <span>Assegnazioni</span>
  <fa-icon [icon]="UsersIcon" />
</div>
<app-test-assignments [attempts]="Attempts()" />

<!-- Statistiche -->
<div class="section-heading mt-5">
  <span>Statistiche</span>
  <fa-icon [icon]="ChartIcon" />
</div>
<div class="mb-4">
  <app-test-ai-summary [id]="TestId()!" mode="test" />
</div>
<app-test-stats
  [attempts]="Attempts()"
  [maxScore]="TestData()?.maxScore || 0"
  [classes]="Classes()"
/>

} @else {
<div class="alert alert-warning" role="alert">Test non trovato</div>
}
