<div class="login-page">
  <!-- LEFT PANEL — blue card, large desktop only -->
  <div class="login-left d-none d-lg-flex">
    <div class="login-left__logo">
      <img src="/images/logotipo.svg" alt="Syllex" height="52" />
    </div>
    <div class="login-left__spacer"></div>
    <div class="login-left__footer">
      <h2 class="login-left__title">Benvenuti in Syllex</h2>
      <p class="login-left__subtitle">Entra nella piattaforma.</p>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="login-right">
    <div class="login-form-container">
      <!-- Logo + tagline (tagline hidden on large desktop where left panel is visible) -->
      <div class="mb-4">
        <img src="/images/logo_primary.png" alt="Syllex" height="52" />
        <p class="login-tagline d-block d-lg-none">Benvenuti in Syllex</p>
        <p class="login-tagline-sub d-block d-lg-none">
          Entra nella piattaforma.
        </p>
      </div>
      <app-login-form></app-login-form>
    </div>
  </div>
</div>
