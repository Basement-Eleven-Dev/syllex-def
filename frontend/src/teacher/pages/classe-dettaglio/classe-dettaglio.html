<ng-container *transloco="let t; read: 'class_detail'">
@if (IsLoading()) {
<div
  class="d-flex justify-content-center align-items-center"
  style="min-height: 400px"
>
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">{{ t('loading') }}</span>
  </div>
</div>
} @if (ErrorMessage()) {
<div class="alert alert-danger" role="alert">{{ ErrorMessage() }}</div>
} @if (ClassNotFound()) {
<div class="alert alert-warning" role="alert">{{ t('class_not_found') }}</div>
} @if (ClassData() && !IsLoading()) {
<app-back-to [path]="'/t/classi'" [label]="t('back')" />

<app-syllex-page-header
  [title]="t('title', { name: ClassData()!.name })"
  [description]="t('desc')"
/>

<!-- Statistics Cards -->
<div class="mt-4">
  <app-syllex-kpi-row [kpis]="Stats()" />
</div>

<!-- Assegnazioni -->
<div class="section-heading mt-5">
  <span class="text-muted">{{ t('assignments') }}</span>
  <fa-icon [icon]="UsersIcon" />
</div>
<app-studenti-classe-table
  [classeId]="ClassData()!._id"
  [students]="StudentsData()"
  [testsCount]="AssignedTestsCount()"
/>

<!-- Statistiche -->
<div class="section-heading mt-5">
  <span>{{ t('stats') }}</span>
  <fa-icon [icon]="ChartIcon" />
</div>
<app-statistiche-classe [classId]="ClassData()!._id" />
}
</ng-container>
