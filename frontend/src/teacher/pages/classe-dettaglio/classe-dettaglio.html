@if (IsLoading()) {
<div
  class="d-flex justify-content-center align-items-center"
  style="min-height: 400px"
>
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Caricamento...</span>
  </div>
</div>
} @if (ErrorMessage()) {
<div class="alert alert-danger" role="alert">{{ ErrorMessage() }}</div>
} @if (ClassNotFound()) {
<div class="alert alert-warning" role="alert">Classe non trovata</div>
} @if (ClassData() && !IsLoading()) {
<div class="class-header">
  <button
    class="back-btn"
    [routerLink]="'/t/classi'"
    aria-label="Torna alle classi"
  >
    <fa-icon [icon]="ArrowLeftIcon" />
  </button>
  <span class="class-header__title">Classe: {{ ClassData()!.name }}</span>
</div>

<!-- Statistics Cards -->
<div class="mt-4">
  <app-syllex-kpi-row [kpis]="Stats()" />
</div>

<!-- Assegnazioni -->
<div class="section-heading mt-5">
  <span>Assegnazioni</span>
  <fa-icon [icon]="UsersIcon" />
</div>
<app-studenti-classe-table
  [classeId]="ClassData()!._id"
  [students]="StudentsData()"
  [testsCount]="AssignedTestsCount()"
/>

<!-- Statistiche -->
<div class="section-heading mt-5">
  <span>Statistiche</span>
  <fa-icon [icon]="ChartIcon" />
</div>
<app-statistiche-classe [classId]="ClassData()!._id" />
}
