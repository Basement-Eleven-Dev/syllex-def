<app-syllex-page-header
  [title]="'Banca Domande'"
  [description]="'Qui puoi trovare tutte le domande con cui comporre i test di ' + (materiaService.materiaSelected()?.name || '') + '.'"
>
  <app-syllex-button
    [props]="{
          label: 'Crea Domanda',
          variant: 'secondary',
          size: 'large'
        }"
    routerLink="/t/create-question"
  />
</app-syllex-page-header>

<section
  class="d-flex flex-row align-items-center gap-3"
  tourAnchor="banca_filters"
>
  <app-questions-search-filters
    class="flex-grow-1"
    (filtersChanged)="onFiltersChanged($event)"
  >
    <app-view-type-toggle
      class="ms-auto"
      tourAnchor="banca_toggle"
      [viewType]="ViewType"
      [pageKey]="'banca'"
      (viewTypeChange)="onChangeViewType($event)"
    />
  </app-questions-search-filters>
</section>

@if (ViewType === 'table') {
<div class="mt-4">
  <app-question-table
    [questions]="Questions()"
    (removeMe)="onDeleteQuestion($event)"
  />
</div>
} @else {
<div class="questions-masonry mt-4">
  @for(question of Questions(); track question._id; let last = $last; let i =
  $index) {
  <div class="questions-masonry-item">
    <div
      app-question-card
      [question]="question"
      mode="banca"
      (removeMe)="onDeleteQuestion($event)"
    ></div>
  </div>
  }
</div>
}
<div
  class="mt-5 d-flex flex-row justify-content-between align-items-center mb-5"
  tourAnchor="banca_pagination"
>
  <app-syllex-pagination
    [collectionSize]="CollectionSize()"
    [page]="Page()"
    [pageSize]="PageSize()"
    (pageChange)="Page.set($event)"
  />

  <select
    class="form-select custom-input"
    style="width: auto"
    [ngModel]="PageSize()"
    (ngModelChange)="PageSize.set($event); Page.set(1)"
  >
    <option [ngValue]="5">5 per pagina</option>
    <option [ngValue]="10">10 per pagina</option>
    <option [ngValue]="20">20 per pagina</option>
  </select>
</div>
