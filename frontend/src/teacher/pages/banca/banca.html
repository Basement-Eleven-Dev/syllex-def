<ng-container *transloco="let t; read: 'banca'">
<app-syllex-page-header
  [title]="t('header_title')"
  [description]="t('header_desc', { subject: materiaService.materiaSelected()?.name || '' })"
>
  <app-syllex-button
    [props]="{
          label: t('btn_create'),
          variant: 'secondary',
          size: 'medium'
        }"
    routerLink="/t/create-question"
  />
</app-syllex-page-header>

<div class="d-flex mb-3 mb-xl-0 w-100" style="max-width: 100%; min-width: 0;">
  <app-syllex-tab-filter
    class="mb-3 mb-xl-4"
    [options]="tabOptions"
    [value]="ActiveTab()"
    (valueChange)="onTabChange($any($event))"
  />
</div>
<section
  tourAnchor="banca_filters"
  class="d-flex flex-column flex-xl-row gap-3 justify-content-between align-items-start align-items-xl-center mb-4"
>
  <div class="w-100" style="max-width: 100%;">
    <app-questions-search-filters
      class="flex-grow-1"
      (filtersChanged)="onFiltersChanged($event)"
    />
  </div>

  <app-view-type-toggle
    class="align-self-end align-self-xl-auto"
    tourAnchor="banca_toggle"
    [viewType]="ViewType"
    [pageKey]="'banca'"
    (viewTypeChange)="onChangeViewType($event)"
  />
</section>
@if (Questions().length === 0) {
  <div class="mt-5 mb-5">
    <app-syllex-empty-state
      [title]="t('empty.title')"
      [description]="t('empty.desc')"
      [icon]="QuestionIcon"
      [actionLabel]="t('empty.action')"
      actionLink="/t/create-question"
      [actionIcon]="PlusIcon"
    ></app-syllex-empty-state>
  </div>
} @else {
  @if (ViewType === 'table') {
  <div class="mt-4">
    <app-question-table
      [questions]="Questions()"
      (removeMe)="onDeleteQuestion($event)"
    />
  </div>
  } @else {
  <div class="questions-masonry mt-4">
    @for(question of Questions(); track question._id; let last = $last; let i =
    $index) {
    <div class="questions-masonry-item">
      <div
        app-question-card
        [question]="question"
        mode="banca"
        (removeMe)="onDeleteQuestion($event)"
      ></div>
    </div>
    }
  </div>
  }
} @if (CollectionSize() > PageSize()) {
<div
  class="mt-4 d-flex justify-content-center justify-content-xl-end gap-1 gap-xl-2 align-items-center mb-5"
  tourAnchor="banca_pagination"
>
  <app-syllex-pagination
    [collectionSize]="CollectionSize()"
    [page]="Page()"
    [pageSize]="PageSize()"
    (pageChange)="Page.set($event)"
  />
</div>
}
</ng-container>
