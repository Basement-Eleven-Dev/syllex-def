<app-syllex-page-header
  [title]="'Calendario'"
  [description]="'Qui puoi trovare tutti gli eventi della tua classe, creando e modificando eventi importanti.'"
>
  <app-syllex-button
    [props]="{
          label: 'Nuovo Evento',
          variant: 'secondary',
          size: 'large',
          link: '/t/eventi/new'
        }"
  />
  <app-syllex-button
    [props]="{
          label: 'Nuova Comunicazione',
          variant: 'secondary',
          size: 'large',
          link: '/t/comunicazioni/new'
        }"
  />
</app-syllex-page-header>

<div tourAnchor="eventi_calendario" class="card form-section p-4">
  <app-calendario [showHeadings]="false" [readonly]="true"></app-calendario>
</div>
