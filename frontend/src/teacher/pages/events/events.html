<app-syllex-page-header
  [title]="'Benvenuto in Calendario,'"
  [description]="'qui puoi trovare tutti gli eventi e le comunicazioni della tua classe.'"
>
  <div class="d-flex gap-2">
    <app-syllex-button
      [props]="{
            label: 'Nuovo Evento',
            variant: 'secondary',
            size: 'medium',
            link: '/t/eventi/new'
          }"
    />
    <app-syllex-button
      [props]="{
            label: 'Nuova Comunicazione',
            variant: 'outline',
            size: 'medium',
            link: '/t/comunicazioni/new'
          }"
    />
  </div>
</app-syllex-page-header>
<div class="com-wrapper mb-5" style="padding-top: 35px">
  <div class="mb-3 text-white flex-shrink-0 px-4">
    <h2 class="fs-2 fw-semibold mb-0">Comunicazioni recenti</h2>
  </div>
  <div
    class="com-scroll"
    (wheel)="onComScroll($event)"
    (mousedown)="onDragStart($event)"
    (mousemove)="onDragMove($event)"
    (mouseup)="onDragEnd()"
    (mouseleave)="onDragEnd()"
  >
    @for(com of Comunicazioni(); track com._id) {
    <div class="com-item">
      <div
        class="p-4 rounded-5 h-100 bg-white text-dark communication-item-card d-flex flex-column"
      >
        <p class="fs-4 m-0">
          {{ com.title.substring(0, 23) + "..." | titlecase }}
        </p>
        <p class="text-muted mb-2 ellipsis-3-lines flex-grow-1">
          {{ com.content }}
        </p>
        <div class="d-flex justify-content-between">
          <span
            class="text-primary border-0 px-2 py-1 rounded-pill mb-2 d-inline-block small"
          >
            {{ com.createdAt | date:'d MMM yyyy' : '' : 'it' }}
          </span>
          <app-syllex-button
            [props]="{ label: 'Apri', variant: 'primary', size: 'small', link: '/t/comunicazioni/edit/' + com._id }"
          />
        </div>
      </div>
    </div>
    } @empty {
    <div class="text-white opacity-50 py-3">
      Nessuna comunicazione presente.
    </div>
    }
  </div>
</div>

<!-- SEZIONE CALENDARIO -->
<section class="calendar-section pb-4">
  <app-calendario [showHeadings]="false" [readonly]="false"></app-calendario>
</section>
