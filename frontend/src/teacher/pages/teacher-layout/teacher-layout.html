@if (hasTourForRoute()) {
<div
  class="qMark d-flex flex-row align-items-center gap-2 shadow px-3 p-2 rounded-pill"
  (click)="startTour()"
>
  <fa-icon [icon]="questionMarkIcon" class="text-primary"></fa-icon>
  Come funziona?
</div>
}

<div class="w-100 dvh-100 d-flex flex-row">
  @if (showLoading()) {
  <div id="loadingOverlay" animate.enter="fade-in">
    <fa-icon [icon]="SpinnerIcon" [animation]="'spin'" size="3x"></fa-icon>
    <h2>
      Carico i dati di
      <span class="fw-bold">{{ materia.materiaSelected()?.name }}</span>
    </h2>
  </div>
  } @if (!showLoading()) {
  <app-sidebar></app-sidebar>
  <div id="content" class="flex-fill d-flex flex-column">
    <div class="container pt-4">
      <app-nav></app-nav>
    </div>
    <div class="flex-fill overflow-auto d-flex flex-column">
      <div
        class="container py-4 flex-grow-1 d-flex flex-column"
        style="min-height: 0; view-transition-name: teacher-content"
      >
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
  }
</div>

<tour-step-template>
  <ng-template let-step="step">
    <div class="popover-header mb-1 text-center bg-transparent border-0 pb-0">
      <h5 class="fw-bold mb-0">{{ step?.title }}</h5>
    </div>
    <div class="popover-body text-center mt-2 px-3 pb-3">
      <p class="mb-4">{{ step?.content }}</p>

      <div class="d-flex justify-content-between align-items-center mt-3">
        @if (tourService.hasPrev(step)) {
        <button
          class="btn btn-outline-dark btn-sm rounded-pill px-3 opacity-75"
          (click)="tourService.prev()"
        >
          Indietro
        </button>
        } @else {
        <div><!-- Spacer --></div>
        } @if (tourService.hasNext(step)) {
        <button
          class="btn btn-primary btn-sm rounded-pill px-3"
          (click)="tourService.next()"
        >
          Naviga
        </button>
        } @else {
        <button
          class="btn btn-primary btn-sm rounded-pill px-3"
          (click)="tourService.end()"
        >
          Fine
        </button>
        }
      </div>
    </div>
  </ng-template>
</tour-step-template>
