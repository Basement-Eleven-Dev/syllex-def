<app-help-chat></app-help-chat>

<div class="w-100 dvh-100 d-flex flex-row overflow-hidden">
  @if (showLoading()) {
  <div id="loadingOverlay" animate.enter="fade-in">
    <fa-icon [icon]="SpinnerIcon" [animation]="'spin'" size="3x"></fa-icon>
    <h2>
      Carico i dati di
      <span class="fw-bold">{{ materia.materiaSelected()?.name }}</span>
    </h2>
  </div>
  } @if (!showLoading()) {
  <div
    class="sidebar-overlay"
    [class.active]="sidebarOpen()"
    (click)="closeSidebar()"
  ></div>
  <app-sidebar
    [open]="sidebarOpen()"
    (toggleSidebar)="toggleSidebar()"
  ></app-sidebar>
  <div id="content" class="flex-fill d-flex flex-column min-w-0">
    <div class="px-3 px-md-5 pt-4 d-none d-lg-block">
      <app-nav></app-nav>
    </div>
    <div
      class="flex-fill overflow-auto d-flex flex-column"
      (scroll)="onContentScroll($event)"
    >
      <div
        class="px-3 px-md-5 py-4 flex-grow-1 d-flex flex-column"
        style="min-height: 0; view-transition-name: teacher-content"
      >
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
  }
</div>

<nav class="bottom-nav d-lg-none" [class.hidden]="navHidden()">
  <button
    class="bottom-nav-item"
    (click)="$event.stopPropagation(); openHelpChat()"
  >
    <img
      src="/images/logo_primary.png"
      alt="Assistente"
      height="20"
      style="filter: brightness(0) invert(1); opacity: 0.85"
    />
    <span>Assistente</span>
  </button>
  <div ngbDropdown placement="top-end">
    <button class="bottom-nav-item" ngbDropdownToggle>
      <fa-icon [icon]="UserProfileIcon"></fa-icon>
      <span>Profilo</span>
    </button>
    <div ngbDropdownMenu class="p-3" style="min-width: 240px">
      <app-user-contextual-menu></app-user-contextual-menu>
    </div>
  </div>
</nav>

<tour-step-template>
  <ng-template let-step="step">
    <div class="popover-header mb-1 text-center bg-transparent border-0 pb-0">
      <h5 class="fw-bold mb-0">{{ step?.title }}</h5>
    </div>
    <div class="popover-body text-center mt-2 px-3 pb-3">
      <p class="mb-4">{{ step?.content }}</p>

      <div class="d-flex justify-content-between align-items-center mt-3">
        @if (tourService.hasPrev(step)) {
        <button
          class="btn btn-outline-dark btn-sm rounded-pill px-3 opacity-75"
          (click)="tourService.prev()"
        >
          Indietro
        </button>
        } @else {
        <div><!-- Spacer --></div>
        } @if (tourService.hasNext(step)) {
        <button
          class="btn btn-primary btn-sm rounded-pill px-3"
          (click)="tourService.next()"
        >
          Naviga
        </button>
        } @else {
        <button
          class="btn btn-primary btn-sm rounded-pill px-3"
          (click)="tourService.end()"
        >
          Fine
        </button>
        }
      </div>
    </div>
  </ng-template>
</tour-step-template>
