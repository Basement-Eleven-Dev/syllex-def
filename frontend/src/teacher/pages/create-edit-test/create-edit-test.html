@if (IsLoading()) {
<div
  class="d-flex justify-content-center align-items-center"
  style="height: 400px"
>
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Caricamento...</span>
  </div>
</div>
} @else {
<form
  [formGroup]="TestForm"
  class="create-test-container bg-white rounded-4 shadow-sm border"
>
  <div class="row g-0">
    <!-- COLONNA PRINCIPALE (SINISTRA) -->
    <div class="col-12 col-lg-8 border-end">
      <!-- Sezione 1: Header e Info Base -->
      <div class="p-4 p-md-5 border-bottom bg-white">
        <div class="mb-5">
          <h4 class="fw-bold text-dark mb-1">Configurazione Test</h4>
          <p class="text-muted small">
            Definisci i dettagli principali e le classi di destinazione.
          </p>
        </div>

        <div class="row g-4">
          <div class="col-12 col-md-8">
            <label class="form-label text-dark fw-semibold small mb-2"
              >Titolo del Test</label
            >
            <input
              type="text"
              formControlName="title"
              class="form-control form-control-lg border-0 bg-light shadow-none"
              placeholder="Es: Verifica di fine modulo - Elettronica"
            />
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label text-dark fw-semibold small mb-2"
              >Password (Opzionale)</label
            >
            <div class="input-group">
              <input
                type="text"
                formControlName="password"
                class="form-control border-0 bg-light shadow-none"
                placeholder="Chiave d'accesso"
              />
              <button
                class="btn btn-light border-0 px-3 shadow-none"
                type="button"
                (click)="onGeneratePassword()"
              >
                <fa-icon [icon]="GenPasswordIcon"></fa-icon>
              </button>
            </div>
          </div>
          <div class="col-12">
            <label class="form-label text-dark fw-semibold small mb-3"
              >Assegna alle Classi</label
            >
            <app-class-selector
              [selectedClassIds]="assignedClasses"
              (selectedClassIdsChange)="onClassesChange($event)"
            >
            </app-class-selector>
          </div>
        </div>
      </div>

      <!-- Sezione 2: Selezione Domande -->
      <div class="p-4 p-md-5">
        <div
          class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3"
        >
          <div>
            <h5 class="fw-bold mb-1">Banca Domande</h5>
            <p class="text-muted mb-0 small">
              Seleziona i contenuti da includere nella prova.
            </p>
          </div>
          <button
            class="btn btn-outline-primary rounded-3 px-4 py-2 fw-semibold"
            type="button"
            (click)="onAddQuestion()"
          >
            <fa-icon [icon]="PlusIcon" class="me-2"></fa-icon>Nuova Domanda
          </button>
        </div>

        <!-- Filtri in linea -->
        <div class="mb-4">
          <app-questions-search-filters
            (filtersChanged)="questionsSearched.onFiltersChanged($event)"
          >
          </app-questions-search-filters>
        </div>

        <!-- GRIGLIA DI SELEZIONE DOMANDE -->
        <app-questions-grid-selector
          [questions]="questionsSearched.filteredQuestions()"
          [selectedIds]="SelectedQuestionIds()"
          (toggleSelection)="onToggleQuestion($event)"
        ></app-questions-grid-selector>

        <!-- PAGINAZIONE -->
        <div class="mt-5 d-flex justify-content-center">
          <app-syllex-pagination
            [page]="questionsSearched.currentPage()"
            [collectionSize]="questionsSearched.totalQuestions()"
            [pageSize]="questionsSearched.pageSize"
            (pageChange)="questionsSearched.onPageChange($event)"
          ></app-syllex-pagination>
        </div>

        <div class="d-none">
          <app-search-questions
            #questionsSearched
            [selectedQuestionIds]="[]"
          ></app-search-questions>
        </div>
      </div>
    </div>

    <!-- COLONNA IMPOSTAZIONI (DESTRA) -->
    <div class="col-12 col-lg-4 bg-light border-start">
      <div class="right-panel p-4 p-md-5">
        <!-- 1. Disponibilità -->
        <div class="settings-group mb-5">
          <label class="d-flex align-items-center text-dark fw-bold small mb-4">
            <fa-icon [icon]="CalendarIcon" class="me-2"></fa-icon> Disponibilità
          </label>
          <div class="mb-3">
            <label class="text-muted small mb-1 d-block">Data Inizio</label>
            <input
              type="date"
              formControlName="availableFrom"
              class="form-control border-0 bg-white shadow-sm"
            />
          </div>
          <div>
            <label class="text-muted small mb-1 d-block">Data Fine</label>
            <input
              type="date"
              formControlName="availableTo"
              class="form-control border-0 bg-white shadow-sm"
            />
          </div>
        </div>

        <!-- Requisiti -->
        <div class="settings-group mb-5">
          <label class="d-flex align-items-center text-dark fw-bold small mb-4">
            <fa-icon [icon]="ClockIcon" class="me-2"></fa-icon> Requisiti e
            tempo
          </label>

          <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <label class="text-muted small">Punteggio Idoneità</label>
              <span class="badge bg-white text-dark border shadow-sm fw-medium"
                >Max: {{ maxScore }} pt</span
              >
            </div>
            <input
              type="number"
              formControlName="requiredScore"
              class="form-control border-0 bg-white shadow-sm py-2"
              placeholder="Min. punti"
            />
          </div>

          <div>
            <label class="text-muted small mb-2 d-block"
              >Tempo Limite (minuti)</label
            >
            <div class="input-group shadow-sm rounded-3 overflow-hidden">
              <input
                type="number"
                formControlName="time"
                class="form-control border-0 bg-white py-2 shadow-none"
                [placeholder]="time === null ? 'Tempo illimitato' : 'Minuti'"
              />
              <button
                class="btn btn-white border-0 px-3"
                type="button"
                [class.text-primary]="time === null"
                (click)="onToggleUnlimitedTime()"
              >
                <fa-icon [icon]="InfinityIcon"></fa-icon>
              </button>
            </div>
          </div>
        </div>

        <!-- Comportamento -->
        <div class="settings-group mb-5">
          <label class="d-flex align-items-center text-dark fw-bold small mb-4">
            <fa-icon [icon]="TrophyIcon" class="me-2"></fa-icon> Comportamento
          </label>
          <div class="d-flex flex-column gap-3">
            <div class="form-check form-switch custom-switch">
              <input
                class="form-check-input"
                type="checkbox"
                role="switch"
                id="random-sw"
                formControlName="randomizeQuestions"
              />
              <label class="form-check-label text-dark small" for="random-sw"
                >Randomizza domande</label
              >
            </div>
            <div class="form-check form-switch custom-switch">
              <input
                class="form-check-input"
                type="checkbox"
                role="switch"
                id="oneshot-sw"
                formControlName="oneShotAnswers"
              />
              <label class="form-check-label text-dark small" for="oneshot-sw"
                >Risposta secca (One-shot)</label
              >
            </div>
          </div>
        </div>

        <!-- Azioni Finali -->
        <div class="mt-auto pt-4 border-top">
          <button
            class="btn btn-primary w-100 py-3 fw-bold shadow-sm rounded-3 mb-3 d-flex align-items-center justify-content-center gap-2"
            type="button"
            (click)="onPreview()"
            [disabled]="SelectedQuestionIds().length === 0"
          >
            <fa-icon [icon]="SaveIcon"></fa-icon> Vedi Anteprima
          </button>

          <div class="row g-2">
            <div class="col-8">
              <button
                class="btn btn-dark w-100 py-2 fw-bold shadow-none"
                type="button"
                (click)="onSaveTest()"
                [disabled]="IsLoading() || !CanPublish()"
                [ngbTooltip]="PublishBlockers().length ? publishTooltip : ''"
                placement="top"
                tooltipClass="tooltip-blockers"
              >
                Pubblica Test
              </button>
              <ng-template #publishTooltip>
                <div class="text-start">
                  @for (b of PublishBlockers(); track b) {
                  <div>· {{ b }}</div>
                  }
                </div>
              </ng-template>
            </div>
            <div class="col-4">
              <button
                class="btn btn-warning w-100 py-2 small shadow-none border-0 text-white"
                type="button"
                (click)="onSaveTest(true)"
                [disabled]="IsLoading() || !CanSaveDraft()"
              >
                Bozza
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</form>
}
