<ng-container *transloco="let t; read: 'dashboard'">
  <app-syllex-page-header
    [title]="t('welcome_name', { name: authService.user?.firstName })"
    [description]="t('discover_actions')"
  />

  <div class="row g-3 mb-4">
    <div class="col-12 col-md-6 col-xl-3">
      <app-syllex-card
        [title]="t('upload_materials_title')"
        [description]="t('upload_materials_desc')"
        [icon]="UploadIcon"
        variant="filled"
        color="primary"
        link="/t/risorse"
      ></app-syllex-card>
    </div>
    <div class="col-12 col-md-6 col-xl-3">
      <app-syllex-card
        [title]="t('generate_material_ai_title')"
        [description]="t('generate_material_ai_desc')"
        [icon]="AiIcon"
        variant="filled"
        color="purple"
        link="/t/laboratorio-ai"
      ></app-syllex-card>
    </div>
    <div class="col-12 col-xl-6 p-4">
      <div
        class="d-flex justify-content-between align-items-center text-primary fw-bold fs-4"
      >
        <p class="m-0 fs-2">{{ t('communicate_students_title') }}</p>
        <fa-icon [icon]="faBell"></fa-icon>
      </div>
      <p class="m-0 text-muted mb-5">
        {{ t('communicate_students_desc') }}
      </p>

      <app-syllex-button
        [props]="{
            label: t('new_communication'),
            variant: 'primary',
            size: 'large'
          }"
        (clicked)="openNuovaComunicazioneModal()"
      ></app-syllex-button>
    </div>
  </div>

  <div class="row g-3 mb-5">
    <div class="col-12 col-xl-6">
      <app-syllex-banner
        [title]="bannerTitle"
        [buttonText]="t('try_it_now')"
        buttonLink="/t/agente"
        bgImage="/images/sfondo_palle.png"
        bgSize="cover"
        bgPosition="right"
      >
      </app-syllex-banner>
    </div>
    <div class="col-12 col-md-6 col-xl-3">
      <app-syllex-card
        [title]="t('tests_to_grade_count', { count: testsToGradeCount })"
        [description]="testsToGradeCount > 0 ? t('tests_to_grade_desc_positive', { subject: selectedMateriaName }) : t('tests_to_grade_desc_zero', { subject: selectedMateriaName })"
        [titleTextSize]="'large'"
        [icon]="UsersIcon"
        variant="outline"
        color="primary"
        link="/t/tests"
      ></app-syllex-card>
    </div>
    <div class="col-12 col-md-6 col-xl-3">
      <app-syllex-card
        [title]="t('generate_test_ai_title')"
        [description]="t('generate_test_ai_desc')"
        [icon]="AiIcon"
        variant="filled"
        color="blue"
        link="/t/tests/new"
      ></app-syllex-card>
    </div>
  </div>
</ng-container>
