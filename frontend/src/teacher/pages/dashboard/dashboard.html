<app-syllex-page-header
  [title]="'Ciao, ' + authService.user?.firstName"
  [description]="'scopri le azioni che puoi fare oggi.'"
/>

<div class="row g-4 mb-4">
  <div class="col-12 col-lg-3">
    <app-syllex-card
      title="Carica materiali"
      description="Upload rapido di PDF, file, immagini e appunti tramite drag & drop."
      [icon]="UploadIcon"
      variant="filled"
      color="primary"
      link="/t/risorse"
    ></app-syllex-card>
  </div>
  <div class="col-12 col-lg-3">
    <app-syllex-card
      title="Genera un materiale con AI"
      description="Scegli tra diverse opzioni per creare contenuti personalizzati."
      [icon]="AiIcon"
      variant="filled"
      color="purple"
      link="/t/laboratorio-ai"
    ></app-syllex-card>
  </div>
  <div class="col p-4">
    <div
      class="d-flex justify-content-between align-items-center text-primary fw-bold fs-4"
    >
      <p class="m-0">Comunica con i tuoi studenti</p>
      <fa-icon [icon]="faBell"></fa-icon>
    </div>
    <p class="m-0 text-muted">
      I tuoi studenti sono pronti a ricevere le tue comunicazioni.
    </p>

    <button
      class="btn btn-outline-primary w-100 mt-4 d-flex py-4 justify-content-start"
      [routerLink]="['/t/comunicazioni/new']"
    >
      <fa-icon [icon]="faPlus" class="me-2 ms-2"></fa-icon>
      Nuova comunicazione
    </button>
  </div>
</div>

<div class="row g-4 mb-5">
  <div class="col-12 col-lg-6">
    <app-syllex-banner
      [title]="bannerTitle"
      buttonText="Provalo subito"
      buttonLink="/t/agente"
      bgImage="/images/sfondo_palle.png"
      bgSize="cover"
      bgPosition="right"
    >
    </app-syllex-banner>
  </div>
  <div class="col-12 col-lg-3">
    <app-syllex-card
      [title]="testsToGradeCount + ' test'"
      [description]="'Hai ancora delle verifiche da correggere per ' + selectedMateriaName"
      [titleTextSize]="'large'"
      [icon]="UsersIcon"
      variant="outline"
      color="primary"
      link="/t/tests"
    ></app-syllex-card>
  </div>
  <div class="col-12 col-lg-3">
    <app-syllex-card
      title="Genera un test con AI"
      description="Scegli materia, argomento e difficoltà."
      [icon]="AiIcon"
      variant="filled"
      color="blue"
      link="/t/tests/new"
    ></app-syllex-card>
  </div>
</div>
