<div
  tourAnchor="comunicazioni_header"
  class="d-flex flex-row align-items-center mb-5"
>
  <div>
    <h1 class="text-dark fw-medium mb-3 display-6">Comunicazioni</h1>
    <h5 class="text-dark mb-0 fw-normal">
      Comunica con le tue classi inviando loro comunicazioni importanti e
      aggiornamenti.
    </h5>
  </div>
  <button
    tourAnchor="comunicazioni_new_button"
    class="btn btn-gradient-secondary btn-lg ms-auto py-3 icon-btn"
    routerLink="/t/comunicazioni/new"
  >
    <fa-icon [icon]="PlusIcon"></fa-icon>
    Nuova comunicazione
  </button>
</div>

<section tourAnchor="comunicazioni_filters" class="d-flex flex-row mb-5 gap-3">
  <app-syllex-search-input
    placeholder="Cerca comunicazione tramite parole chiave..."
    [value]="SearchTerm()"
    (valueChange)="onSearchTermChange($event)"
    style="min-width: 400px"
  />

  <app-syllex-select-input
    [value]="SelectedClassId()"
    (valueChange)="onClassFilterChange($event)"
    style="min-width: 100px"
    placeholder="Classi"
    [options]="classiSelectOptions()"
  />
  <app-syllex-select-input
    [value]="SelectedHasAttachments()"
    (valueChange)="onAttachmentsFilterChange($event)"
    style="min-width: 100px"
    placeholder="Allegati"
    [options]="attachmentOptions"
  />
  <app-syllex-clear-button (clicked)="clearFilters()" />
</section>

@for(comunicazione of Comunicazioni(); track comunicazione._id; let first =
$first){
<div
  class="mb-3"
  [tourAnchor]="first ? 'comunicazioni_first_card' : ''"
  app-comunicazione-card
  [comunicazione]="comunicazione"
  (deleted)="onComunicazioneDeleted($event)"
></div>
}

<div
  tourAnchor="comunicazioni_pagination"
  class="mt-5 d-flex flex-row justify-content-between align-items-center"
>
  <app-syllex-pagination
    [collectionSize]="CollectionSize()"
    [page]="Page()"
    [pageSize]="PageSize()"
    (pageChange)="Page.set($event)"
  />

  <select
    class="form-select custom-input"
    style="width: auto"
    [ngModel]="PageSize()"
    (ngModelChange)="PageSize.set($event); Page.set(1)"
  >
    <option [ngValue]="5">5 per pagina</option>
    <option [ngValue]="10">10 per pagina</option>
    <option [ngValue]="20">20 per pagina</option>
  </select>
</div>
