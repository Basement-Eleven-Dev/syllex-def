<ng-container *transloco="let t; read: 'classi'">
<app-syllex-page-header
  [title]="t('header_title', { subject: materiaService.materiaSelected()!.name })"
  [description]="t('header_desc')"
/>

<section class="classi-filter-bar my-4">
  <app-syllex-search-input
    [placeholder]="t('search_placeholder')"
    [value]="SearchTerm()"
    (valueChange)="onSearchTermChange($event)"
    class="classi-filter-bar__search"
  />

  <app-syllex-select-input
    [value]="SelectedYear().toString()"
    (valueChange)="onYearChange($event)"
    [placeholder]="t('all_years')"
    [options]="yearOptions"
    class="classi-filter-bar__select"
  />

  <app-syllex-clear-button (clicked)="clearFilters()" />

  <app-view-type-toggle
    class="ms-auto"
    [viewType]="viewType"
    [pageKey]="'classi'"
    (viewTypeChange)="onChangeViewType($event)"
  />
</section>

@if (FilteredClassi().length === 0) {
  <div class="mt-5 mb-5">
    <app-syllex-empty-state
      [title]="t('empty.title')"
      [description]="t('empty.desc')"
      [icon]="UsersIcon"
      [actionLabel]="t('empty.action')"
      actionLink="/t/dashboard"
    ></app-syllex-empty-state>
  </div>
} @else {
  <app-syllex-kpi-row [kpis]="KpiClassi()" />

  <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3 mt-4">
    <app-syllex-pagination
      [collectionSize]="CollectionSize()"
      [page]="Page()"
      [pageSize]="PageSize()"
      (pageChange)="onNewPageRequested($event)"
    />

    <select
      class="form-select custom-input"
      style="width: auto"
      [ngModel]="PageSize()"
      (ngModelChange)="onPageSizeChange($event)"
    >
      <option [ngValue]="5">{{ t('per_page', {count: 5}) }}</option>
      <option [ngValue]="10">{{ t('per_page', {count: 10}) }}</option>
      <option [ngValue]="20">{{ t('per_page', {count: 20}) }}</option>
    </select>
  </div>
}
</ng-container>
