<app-syllex-page-header
  [title]="'Le tue classi di ' + materiaService.materiaSelected()!.name"
  [description]="'Gestisci e visualizza le tue classi da qui.'"
/>

<section class="d-flex flex-row my-5 gap-3">
  <div>
    <input
      type="text"
      class="form-control custom-input filter"
      id="search-term"
      placeholder="Cerca classi..."
      style="min-width: 400px"
      [value]="SearchTerm()"
      (input)="onSearchTermChange($any($event.target).value)"
    />
  </div>
  <div>
    <select
      id="year-filter"
      class="form-select custom-input filter"
      style="min-width: 200px"
      [value]="SelectedYear()"
      (change)="onYearChange($any($event.target).value)"
    >
      <option value="">Tutti gli anni</option>
      <option value="2026">2026</option>
      <option value="2027">2027</option>
      <option value="2028">2028</option>
      <option value="2029">2029</option>
      <option value="2030">2030</option>
    </select>
  </div>
  <button
    type="button"
    class="btn btn-outline-danger"
    (click)="clearFilters()"
    title="Pulisci filtri"
  >
    <fa-icon [icon]="ClearIcon"></fa-icon>
  </button>
  <app-view-type-toggle
    class="ms-auto"
    [viewType]="viewType"
    [pageKey]="'classi'"
    (viewTypeChange)="onChangeViewType($event)"
  />
</section>

<app-syllex-kpi-row [kpis]="KpiClassi()" />

<div class="d-flex flex-row justify-content-between align-items-center mt-4">
  <app-syllex-pagination
    [collectionSize]="CollectionSize()"
    [page]="Page()"
    [pageSize]="PageSize()"
    (pageChange)="onNewPageRequested($event)"
  />

  <select
    class="form-select custom-input"
    style="width: auto"
    [ngModel]="PageSize()"
    (ngModelChange)="onPageSizeChange($event)"
  >
    <option [ngValue]="5">5 per pagina</option>
    <option [ngValue]="10">10 per pagina</option>
    <option [ngValue]="20">20 per pagina</option>
  </select>
</div>
