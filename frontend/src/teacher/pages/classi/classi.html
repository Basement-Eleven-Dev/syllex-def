<app-syllex-page-header
  [title]="'Le tue classi di ' + materiaService.materiaSelected()!.name"
  [description]="'Gestisci e visualizza le tue classi da qui.'"
/>

<section class="d-flex flex-column flex-xl-row my-4 gap-3 align-items-start align-items-xl-center">
  <div class="search-wrapper w-100" style="max-width: 100%;">
    <app-syllex-search-input
      placeholder="Cerca classi..."
      [value]="SearchTerm()"
      (valueChange)="onSearchTermChange($event)"
    />
  </div>
  
  <div class="d-flex flex-row gap-2 w-100 flex-xl-grow-0" style="max-width: 100%;">
    <div class="select-wrapper flex-grow-1">
      <app-syllex-select-input
        [value]="SelectedYear().toString()"
        (valueChange)="onYearChange($event)"
        placeholder="Tutti gli anni"
        [options]="yearOptions"
      />
    </div>
    <app-syllex-clear-button (clicked)="clearFilters()" />
  </div>

  <app-view-type-toggle
    class="ms-xl-auto align-self-end align-self-xl-center"
    [viewType]="viewType"
    [pageKey]="'classi'"
    (viewTypeChange)="onChangeViewType($event)"
  />
</section>

@if (FilteredClassi().length === 0) {
  <div class="mt-5 mb-5">
    <app-syllex-empty-state
      title="Nessuna classe assegnata"
      description="Non ci sono ancora classi associate al tuo account per questa materia. Contatta l'amministratore del tuo istituto per richiedere l'assegnazione delle tue classi."
      [icon]="UsersIcon"
      actionLabel="Torna alla Dashboard"
      actionLink="/t/dashboard"
    ></app-syllex-empty-state>
  </div>
} @else {
  <app-syllex-kpi-row [kpis]="KpiClassi()" />

  <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3 mt-4">
    <app-syllex-pagination
      [collectionSize]="CollectionSize()"
      [page]="Page()"
      [pageSize]="PageSize()"
      (pageChange)="onNewPageRequested($event)"
    />

    <select
      class="form-select custom-input"
      style="width: auto"
      [ngModel]="PageSize()"
      (ngModelChange)="onPageSizeChange($event)"
    >
      <option [ngValue]="5">5 per pagina</option>
      <option [ngValue]="10">10 per pagina</option>
      <option [ngValue]="20">20 per pagina</option>
    </select>
  </div>
}
