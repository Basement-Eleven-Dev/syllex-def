<div class="questions-scroll-list" (scroll)="onListScroll($event)">
  @for (question of questions; track question._id) {
  <button
    type="button"
    class="question-row"
    [class.question-row--selected]="isSelected(question._id)"
    (click)="onToggle(question)"
  >
    <div class="question-row__content">
      <div class="d-flex align-items-center gap-2 mb-1 flex-wrap">
        <span
          class="badge rounded-pill"
          [class.bg-primary]="!isSelected(question._id)"
          [class.bg-white]="isSelected(question._id)"
          [class.text-primary]="isSelected(question._id)"
        >
          {{ getQuestionTypeLabel(question.type) }}
        </span>
        @if (question.difficulty) {
        <span class="question-row__meta"
          >Difficoltà: {{ question.difficulty }}</span
        >
        } @if (question.tags && question.tags.length > 0) {
        <span class="question-row__meta">• {{ question.tags[0] }}</span>
        }
      </div>

      <p class="question-row__text mb-0">{{ question.text }}</p>
    </div>
  </button>
  } @empty {
  <div class="text-center py-5 opacity-50">
    <p class="fs-5">Nessuna domanda trovata con questi filtri.</p>
  </div>
  } @if (isLoadingMore) {
  <div class="text-center py-3 text-muted small">
    Caricamento altre domande...
  </div>
  } @if (!canLoadMore && questions.length > 0) {
  <div class="text-center py-3 text-muted small">Hai raggiunto la fine.</div>
  }
</div>
