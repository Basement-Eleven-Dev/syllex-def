<div class="modal-header">
  <h5 class="modal-title">Assegna alle Classi</h5>
  <button
    type="button"
    class="btn-close"
    aria-label="Close"
    (click)="cancel()"
  ></button>
</div>

<div class="modal-body">
  <div class="mb-3">
    <p class="text-muted">
      Seleziona le classi a cui assegnare "{{ resource.name }}"
    </p>
  </div>

  @if (ErrorMessage()) {
  <div class="alert alert-danger" role="alert">{{ ErrorMessage() }}</div>
  }

  <div class="mb-3">
    <app-class-selector
      [selectedClassIds]="SelectedClassIds()"
      (selectedClassIdsChange)="onClassSelectionChange($event)"
    />
  </div>
</div>

<div class="modal-footer">
  <app-syllex-button
    [props]="{
          label: 'Annulla',
          variant: 'primary',
          color: 'celestine',
          size: 'medium',
          disabled: IsSaving()
        }"
    (click)="cancel()"
  />

  <app-syllex-button
    [props]="{
          label: 'Salva',
          variant: 'primary',
          size: 'medium',
          disabled: IsSaving()
        }"
    (click)="saveAssignment()"
  >
    @if (IsSaving()) {
    <span class="spinner-border spinner-border-sm me-2" role="status"></span>
    } Salva
  </app-syllex-button>
</div>
