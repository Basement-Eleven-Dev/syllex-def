<ng-container *transloco="let t; read: 'test_menu'">
<button ngbDropdownItem [routerLink]="'/t/tests/edit/' + test._id">
  {{ t('edit') }}
</button>
@if(['bozza', 'archiviato'].includes(test.status!)) {
<button ngbDropdownItem (click)="publish.emit(test._id)">{{ t('publish') }}</button>
}
<button ngbDropdownItem (click)="duplicate.emit(test._id)">{{ t('duplicate') }}</button>
<button ngbDropdownItem (click)="onRequestAssignToClass()">{{ t('assign') }}</button>
<div class="dropdown-divider"></div>
<button
  ngbDropdownItem
  class="text-danger"
  confirmAction
  [confirmMessage]="t('confirm_delete_msg', {name: test.name})"
  [confirmTitle]="t('confirm_delete_title')"
  (confirmed)="delete.emit(test._id)"
>
  {{ t('delete') }}
</button>
</ng-container>
