<nav
  class="bg-primary py-3 px-3 px-md-4 d-flex flex-row align-items-center gap-3 teacher-nav container-fluid"
>
  <!-- Subject selector -->
  @if (selectedSubject()) {
  <div class="subject-selector">
    <div ngbDropdown class="d-inline-block">
      <button
        ngbDropdownToggle
        class="subject-pill-btn d-flex align-items-center gap-2"
      >
        <fa-icon
          [icon]="ArrowDownIcon"
          [size]="'lg'"
          class="subject-pill-chevron"
        ></fa-icon>
        <span class="subject-pill-name">{{ selectedSubject()!.name }}</span>
      </button>
      <div ngbDropdownMenu class="subject-dropdown-menu shadow">
        @for (subject of allSubjects(); track subject._id) {
        <button
          ngbDropdownItem
          class="subject-dropdown-item d-flex align-items-center gap-2"
          [class.active]="selectedSubject()!._id === subject._id"
          (click)="selectSubject(subject)"
        >
          <fa-icon
            [icon]="CheckIcon"
            [size]="'xs'"
            class="check-icon flex-shrink-0"
            [class.invisible]="selectedSubject()!._id !== subject._id"
          ></fa-icon>
          <span class="subject-dropdown-item-label">{{ subject.name }}</span>
        </button>
        }
      </div>
    </div>
    <app-syllex-button
      [props]="{
          label: 'Argomenti',
          variant: 'underline',
          color: 'white',
          size: 'small'
        }"
      (clicked)="onRequestSubjectSettings()"
    ></app-syllex-button>
  </div>
  }

  <div class="flex-fill d-flex flex-row justify-content-end align-items-center gap-4">
    <div class="d-flex flex-row gap-3">
      <button
        class="btn calendarBtn bg-transparent d-none d-xxl-block flex-shrink-0 py-3"
      >
        <span class="opacity-75">{{ now | date: 'EEE,' }}</span>
        <span class="fw-bold mx-1">{{ now | date: 'd MMMM' | titlecase }}</span>
        <span class="opacity-75">{{ now | date: 'yyyy' }}</span>
      </button>

      <!-- <input
        type="text"
        class="form-control w-auto custom-input d-none d-md-block"
        placeholder="Search..."
        style="min-width: 300px"
      /> -->
    </div>
    <div
      class="rounded-pill py-3 px-4 d-flex align-items-center gap-2 px-3 py-2"
      style="background: #d7eef7; cursor: pointer"
      (click)="toggleHelpChat(); $event.stopPropagation()"
    >
      <img
        src="/images/logo_primary.png"
        alt="Logo"
        height="18"
        style="flex-shrink: 0"
      />
      <span
        class="d-none d-xxl-inline slim-hide"
        style="
          color: #3931ce;
          font-weight: 500;
          font-size: 0.85rem;
          white-space: nowrap;
        "
        >Come posso aiutarti?</span
      >
    </div>
    
    <app-language-selector></app-language-selector>

    <div ngbDropdown class="d-inline-block" tourAnchor="teacher-profile">
      <div
        id="dropdownBasic1"
        ngbDropdownToggle
        class="d-flex flex-row align-items-center gap-2 h-100"
      >
        <a
          class="d-flex align-items-center justify-content-center text-white p-0 text-decoration-none"
        >
          <fa-icon
            [icon]="UserProfileIcon"
            class="bg-primary"
            [size]="'3x'"
          ></fa-icon>
          <!--           <fa-icon
            [icon]="UserProfileIcon"
            class="text-secondary"
            [size]="'2x'"
          ></fa-icon> -->
        </a>
      </div>
      <div
        ngbDropdownMenu
        aria-labelledby="dropdownBasic1"
        class="p-3 dropdown-menu"
      >
        <app-user-contextual-menu></app-user-contextual-menu>
      </div>
    </div>
  </div>
  <app-help-chat></app-help-chat>
</nav>
