<div class="agent-config-card shadow-lg border-0 rounded-5 p-4 p-lg-5 bg-white">
  <form [formGroup]="agentSettingsForm" (ngSubmit)="onSubmit()" class="d-flex flex-column gap-5">
    
    <!-- Nome Agente -->
    <div class="form-group">
      <label class="form-label fw-bold text-dark fs-5 mb-3">Dai un nome al tuo Agente</label>
      <input
        type="text"
        class="form-control form-control-lg custom-pill-input"
        formControlName="name"
        placeholder="Es: Anna, la tua Tutor"
      />
    </div>

    <!-- Tono e Voce Side-by-Side -->
    <div class="row g-4">
      <div class="col-12 col-md-6">
        <div class="form-group">
          <label class="form-label fw-bold text-dark fs-5 mb-3">Tono</label>
          <select class="form-select form-control-lg custom-pill-input" formControlName="tone">
            <option value="friendly">Amichevole</option>
            <option value="formal">Formale</option>
            <option value="concise">Conciso</option>
            <option value="detailed">Dettagliato</option>
          </select>
        </div>
      </div>
      <div class="col-12 col-md-6">
        <div class="form-group">
          <label class="form-label fw-bold text-dark fs-5 mb-3">Voce</label>
          <select class="form-select form-control-lg custom-pill-input" formControlName="voice">
            <option value="neutral">Neutra</option>
            <option value="energetic">Energica</option>
            <option value="clear">Chiara</option>
            <option value="deep">Profonda</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Associazione File -->
    <div class="form-group">
      <label class="form-label fw-bold text-dark fs-5 mb-4">Associa File</label>
      
      <div class="material-selector-container p-4 rounded-4 bg-light border-dashed">
        <app-materiali-selector
          [embeddingCreationMode]="true"
          [associatedMaterialIds]="associatedMaterialIds()"
          (selectionChange)="onMaterialSelectionChange($event)"
          (removeMaterial)="onRemoveMaterial($event)"
        />
      </div>
    </div>

    <!-- Bottone Avanti -->
    <div class="d-flex justify-content-end mt-2">
      <button
        type="submit"
        class="btn btn-primary btn-next px-5 py-3 rounded-pill d-flex align-items-center gap-3 fw-bold"
        [disabled]="isSaving() || isLoading() || !agentSettingsForm.valid"
      >
        @if (isSaving()) {
          <fa-icon [icon]="SpinnerIcon" [animation]="'spin'"></fa-icon>
        } @else {
          <span>Avanti</span>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 4L10.59 5.41L16.17 11H4V13H16.17L10.59 18.59L12 20L20 12L12 4Z" fill="white"/>
          </svg>
        }
      </button>
    </div>
  </form>
</div>
