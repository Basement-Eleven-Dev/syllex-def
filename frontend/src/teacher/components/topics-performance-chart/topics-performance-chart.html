<ng-container *transloco="let t; read: 'class_detail'">
<div class="chart-container">
  <h5 class="fw-semibold text-dark">{{ t('chart_topics_title') }}</h5>
  @if (IsEmpty()) {
  <p class="text-muted fst-italic">
    {{ t('chart_topics_empty') }}
  </p>
  } @else {
  <div style="position: relative; height: 400px; width: 100%">
    <canvas #chart></canvas>
  </div>
  }
</div>
</ng-container>
