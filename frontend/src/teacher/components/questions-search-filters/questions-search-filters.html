<form [formGroup]="SearchForm" class="d-flex flex-column gap-2 mb-3">
  <!-- Riga 1: Ricerca Testuale -->
  <div class="d-flex gap-2 align-items-center">
    <div class="flex-grow-1">
      <input
        type="text"
        class="form-control bg-light border-0 py-2 shadow-none"
        placeholder="Cerca per testo della domanda..."
        formControlName="searchTerm"
      />
    </div>
    <button
      type="button"
      class="btn btn-light border-0 text-danger py-2 px-3 shadow-none"
      (click)="resetFilters()"
      title="Pulisci filtri"
    >
      <fa-icon [icon]="ClearIcon"></fa-icon>
    </button>
  </div>

  <!-- Riga 2: Filtri Specifici (Si adattano alla larghezza della colonna) -->
  <div class="d-flex flex-row flex-wrap gap-2">
    <!-- Tipologia -->
    <div class="flex-fill" style="min-width: 130px;">
      <select class="form-select bg-light border-0 py-2 shadow-none small w-100" formControlName="type">
        <option value="">Tutte le tipologie</option>
        @for(type of ['scelta multipla', 'vero falso', 'risposta aperta']; track $index) {
          <option [value]="type">{{ type | titlecase }}</option>
        }
      </select>
    </div>

    <!-- Argomento -->
    <div class="flex-fill" style="min-width: 130px;">
      <select class="form-select bg-light border-0 py-2 shadow-none small w-100" formControlName="topicId">
        <option value="">Argomento</option>
        @for(topic of materiaService.materiaSelected()?.topics; track $index) {
          <option [value]="topic._id">{{ topic.name }}</option>
        }
      </select>
    </div>

    <!-- Difficoltà -->
    <div class="flex-fill" style="min-width: 100px;">
      <select class="form-select bg-light border-0 py-2 shadow-none small w-100" formControlName="difficulty">
        <option value="">Difficoltà</option>
        @for(opt of DifficultyOptions; track opt.value) {
          <option [value]="opt.value">{{ opt.label }}</option>
        }
      </select>
    </div>

    <!-- Tag -->
    <div class="flex-fill" style="min-width: 120px;">
      <input
        type="text"
        class="form-control bg-light border-0 py-2 shadow-none small w-100"
        placeholder="Filtra per tag..."
        formControlName="tag"
      />
    </div>
  </div>
</form>
