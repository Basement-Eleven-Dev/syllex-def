<form [formGroup]="SearchForm" class="d-flex flex-column gap-2 mb-3">
  <!-- Riga 1: Ricerca Testuale -->
  <div class="d-flex gap-2 align-items-center">
    <div style="max-width: 320px; min-width: 180px; flex: 1">
      <app-syllex-search-input
        placeholder="Cerca per testo della domanda..."
        formControlName="searchTerm"
      />
    </div>
    <app-syllex-clear-button (clicked)="resetFilters()" />
    <ng-content></ng-content>
  </div>

  <!-- Riga 2: Filtri Specifici (Si adattano alla larghezza della colonna) -->
  <div class="d-flex flex-row flex-wrap gap-2">
    <!-- Tipologia -->
    <div class="flex-fill" style="min-width: 130px">
      <app-syllex-select-input
        formControlName="type"
        class="w-100"
        placeholder="Tutte le tipologie"
        [options]="typeOptions"
      />
    </div>

    <!-- Argomento -->
    <div class="flex-fill" style="min-width: 130px">
      <app-syllex-select-input
        formControlName="topicId"
        class="w-100"
        placeholder="Argomento"
        [options]="topicOptions()"
      />
    </div>

    <!-- Difficoltà -->
    <div class="flex-fill" style="min-width: 100px">
      <app-syllex-select-input
        formControlName="difficulty"
        class="w-100"
        placeholder="Difficoltà"
        [options]="DifficultyOptions"
      />
    </div>

    <!-- Tag -->
    <div class="flex-fill" style="min-width: 120px">
      <app-syllex-search-input
        placeholder="Filtra per tag..."
        formControlName="tag"
        class="w-100"
      />
    </div>
  </div>
</form>
