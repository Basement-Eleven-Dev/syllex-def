<div class="tab-filter d-flex gap-1">
  @for (option of options; track option.value) {
  <button
    type="button"
    class="tab-item px-3 px-md-5 py-2 py-md-3 rounded-pill"
    [class.active]="value === option.value"
    (click)="select(option.value)"
  >
    {{ option.label }}
  </button>
  }
</div>
