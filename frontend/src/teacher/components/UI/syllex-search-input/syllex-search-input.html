<div
  class="input-group rounded-pill px-4 overflow-hidden py-2 d-flex gap-2 bg-light"
>
  <span class="input-group-text border-0 text-muted p-0">
    <fa-icon [icon]="SearchIcon"></fa-icon>
  </span>
  <input
    type="text"
    class="form-control border-0 shadow-none bg-transparent p-0"
    [placeholder]="placeholder"
    [value]="value"
    (input)="handleInput($any($event.target).value)"
  />
</div>
