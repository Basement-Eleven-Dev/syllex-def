<button
  class="btn fs-6 fw-normal d-inline-flex align-items-center gap-2"
  [ngClass]="buttonClasses"
  [routerLink]="props.link"
  [disabled]="props.disabled"
  (click)="handleClick()"
  [routerLinkActive]="'active'"
>
  @if (props.leftIcon) {
  <fa-icon [icon]="props.leftIcon"></fa-icon>
  } {{ props.label }} @if (props.rightIcon) {
  <fa-icon [icon]="props.rightIcon"></fa-icon>
  }
</button>
