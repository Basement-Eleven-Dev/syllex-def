<div class="row g-3">
  @for (kpi of kpis; track $index) {
  <div class="col-12 col-sm-6 col-xl-3">
    <div class="kpi-card d-flex justify-content-between">
      <div class="d-flex flex-column gap-1">
        <span class="kpi-value">
          {{ kpi.value }}@if (kpi.requirePercentage) {<small
            class="kpi-percentage"
            >%</small
          >}
        </span>
        <span class="kpi-label">{{ kpi.label }}</span>
      </div>
      <div class="kpi-card__top">
        @if (kpi.buttonLabel && kpi.buttonLink) {
        <app-syllex-button
          [props]="{
          label: kpi.buttonLabel,
          variant: 'primary',
          size: 'medium',
          link: $any(kpi.buttonLink)
        }"
        ></app-syllex-button>
        }
      </div>
    </div>
  </div>
  }
</div>
