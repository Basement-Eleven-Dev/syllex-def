<div class="modal-header border-0 pb-0">
  <div class="d-flex align-items-center gap-2">
    <div class="icon-circle bg-primary-subtle text-primary">
      <fa-icon [icon]="icons.sparkles"></fa-icon>
    </div>
    <div>
      <h5 class="modal-title fw-bold mb-0">Argomenti Suggeriti</h5>
      <p class="text-muted small mb-0">Ho trovato dei nuovi temi nel materiale caricato</p>
    </div>
  </div>
  <button type="button" class="btn-close" aria-label="Close" (click)="onClose()"></button>
</div>

<div class="modal-body py-4">
  <div class="d-flex flex-wrap gap-2 justify-content-center">
    @for (topic of facade.suggestedTopics(); track topic) {
      <div class="topic-chip d-flex align-items-center gap-2 ps-3 pe-2 py-1 border rounded-pill bg-white shadow-sm transition-all">
        <span class="small fw-semibold text-dark">{{ topic }}</span>
        <div class="d-flex gap-1 ms-1">
          <button class="btn btn-sm p-0 text-success rounded-circle chip-btn" (click)="onAdd(topic)" title="Aggiungi">
            <fa-icon [icon]="icons.plus"></fa-icon>
          </button>
          <button class="btn btn-sm p-0 text-muted rounded-circle chip-btn" (click)="onDismiss(topic)" title="Ignora">
            <fa-icon [icon]="icons.clear"></fa-icon>
          </button>
        </div>
      </div>
    }
  </div>
</div>

<div class="modal-footer border-0">
  <button type="button" class="btn btn-light px-4" (click)="onClose()">Chiudi</button>
</div>
