<div class="table-responsive">
  <table class="table table-borderless align-middle">
    <thead>
      <tr>
        <th>Domanda</th>
        <th>Argomento</th>
        <th>Tipologia</th>
        <th>Visibilità</th>
        <th class="text-end">Azioni</th>
      </tr>
    </thead>
    <tbody>
      @for (question of questions(); track question._id) {
      <tr
        (click)="onOpenPreview(question)"
        style="cursor: pointer"
        [class.row-odd]="$odd"
        [class.row-even]="$even"
      >
        <td class="text-truncate" style="max-width: 400px">
          {{ question.text }}
        </td>
        <td>{{ materiaService.getTopicName(question.topicId) }}</td>
        <td>{{ question.type | titlecase }}</td>
        <td>
          @if (question.policy === 'private') {
          <app-syllex-badge label="Uso Test" color="green" />
          } @else {
          <app-syllex-badge label="Esercitazione" color="orange" />
          }
        </td>
        <td class="text-end" (click)="$event.stopPropagation()">
          <div class="d-flex flex-row justify-content-end gap-1">
            <app-syllex-button
              [props]="{ label: '', variant: 'primary', color: 'celestine', size: 'small', shape: 'circle', leftIcon: EditIcon, link: '/t/edit-question/' + question._id }"
            />
            <app-syllex-button
              [props]="{ label: '', variant: 'primary', color: 'danger', size: 'small', shape: 'circle', leftIcon: TrashIcon }"
              confirmAction
              [confirmMessage]="'Vuoi eliminare questa domanda? L\'azione non può essere annullata.'"
              [confirmTitle]="'Elimina domanda'"
              [confirmButtonText]="'Elimina'"
              (confirmed)="removeMe.emit(question._id)"
            />
          </div>
        </td>
      </tr>
      } @empty {
      <tr>
        <td colspan="5" class="text-center text-muted py-4">
          Nessuna domanda trovata.
        </td>
      </tr>
      }
    </tbody>
  </table>
</div>
