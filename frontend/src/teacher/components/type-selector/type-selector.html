<div class="type-selector-grid">
  @for (option of options(); track option.value) {
  <div
    class="rounded-syllex border typeCard"
    [class.p-3]="size() !== 'small'"
    [class.p-2]="size() === 'small'"
    [class.smallCard]="size() === 'small'"
    (click)="onSelectType(option.value)"
    [class.selected]="selectedValue() === option.value"
  >
    <div class="card-body d-flex flex-row align-items-center gap-2">
      <input
        type="radio"
        class="form-check-input flex-shrink-0"
        [checked]="selectedValue() === option.value"
        [attr.aria-label]="option.label"
      />
      <div class="d-flex flex-column flex-fill justify-content-start">
        @if (size() === 'small') {
        <span class="fw-semibold" style="font-size: 0.875rem"
          >{{ option.label }}</span
        >
        } @else {
        <h5 class="mb-0">{{ option.label }}</h5>
        @if (showDescription()) {
        <p class="mb-0 fw-light">{{ option.description }}</p>
        } }
      </div>
      <span class="typeIconWrapper rounded-2 flex-shrink-0">
        <fa-icon
          [icon]="option.icon"
          [size]="size() === 'small' ? '1x' : '2x'"
        ></fa-icon>
      </span>
    </div>
  </div>
  }
</div>
