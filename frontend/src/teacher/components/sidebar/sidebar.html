<div class="h-100 w-100 card">
  <div class="w-100 px-3 py-4 d-flex flex-column h-100">
    <div
      class="card bg-secondary text-dark p-3 d-flex flex-column justify-content-center fw-bold overflow-hidden position-relative slim-hide"
      tourAnchor="teacher-subject-select"
    >
      <div class="position-relative">
        <h4
          class="fw-bold mb-0 pe-4 subject-name"
          [title]="selectedSubject?.name"
        >
          {{ selectedSubject?.name }}
        </h4>
        <button
          class="btn argomenti-btn py-3 btn-sm mt-4 fw-normal w-100"
          (click)="onRequestSubjectSettings()"
          style="min-height: 1.5rem"
        >
          Vedi argomenti
        </button>
        @if (availableSubjects().length > 0) {
        <div
          class="subject-toggle-icon cursor-pointer"
          (click)="toggleSubjectsCollapse()"
          [attr.aria-expanded]="!isSubjectsCollapsed()"
          aria-controls="subjectsCollapse"
        >
          <fa-icon
            [icon]="SubjectToggleIcon"
            class="text-dark"
            [size]="'1x'"
          ></fa-icon>
        </div>
        }
      </div>

      <div
        #collapse="ngbCollapse"
        [ngbCollapse]="isSubjectsCollapsed()"
        id="subjectsCollapse"
      >
        <hr />
        <div class="subjects-scroll-container mt-1 d-flex flex-column gap-2">
          @for(subject of availableSubjects(); track subject._id){
          <div
            class="p-2 fw-normal py-3 px-4 rounded-2 d-flex align-items-center gap-2 cursor-pointer materiaBtn d-flex flex-row justify-content-between align-items-center"
            [class.active]="selectedSubject?._id === subject._id"
            (click)="selectSubject(subject)"
            role="button"
          >
            <span
              class="text-truncate"
              [title]="subject.name"
              style="min-width: 0"
              >{{ subject.name }}</span
            >

            @if (subject.uncorrectedTest != 0) {
            <span
              class="status-pill warning d-flex p-2 align-items-center justify-content-center text-white fw-bold flex-shrink-0"
            >
              <span>{{ subject.uncorrectedTest }}</span></span
            >
            }
          </div>
          }
        </div>
      </div>
    </div>

    <div
      class="slim-subject-btn cursor-pointer"
      (click)="toggleSidebar.emit()"
      [title]="selectedSubject?.name"
    >
      <fa-icon [icon]="SubjectToggleIcon" class="text-success"></fa-icon>
    </div>

    <div id="mainRoutes" class="d-flex flex-column gap-2 flex-fill mt-4">
      @for(route of mainRoutes; track $index){
      <!-- 
      <app-syllex-button
        [props]="{
            label: route.label,
            variant: 'primary',
            size: 'medium',
            link: route.path,
          }"
      ></app-syllex-button> -->
      <div
        class="sidebarRoute w-100 gap-2 d-flex py-3 px-4 align-items-center"
        [routerLink]="route.path"
        routerLinkActive="active"
        [tourAnchor]="route.tourAnchor || ''"
      >
        <!--    <fa-icon [icon]="route.icon"></fa-icon> -->
        <span class="routeLabel slim-hide">{{route.label}}</span>
      </div>
      }
    </div>
    <!-- Help chat button -->

    <div
      class="btn text-start ai ai-sidebar-btn d-flex flex-row align-items-center justify-content-between position-relative"
      routerLink="/t/laboratorio-ai"
      tourAnchor="teacher-ai-lab"
    >
      <fa-icon
        [icon]="HeadSideBrainIcon"
        [size]="'xs'"
        class="ai-deco lab-ai-deco me-2"
      ></fa-icon>
      <h5 class="mb-0 position-relative lab-ai-label slim-hide">Lab AI</h5>
    </div>
    <div
      class="btn text-start ai ai-sidebar-btn d-flex flex-row align-items-center justify-content-between position-relative"
      routerLink="/t/agente"
      tourAnchor="teacher-agent"
    >
      <fa-icon
        [icon]="SparklesIcon"
        [size]="'xs'"
        class="ai-deco chat-ai-deco me-2"
      ></fa-icon>
      <div
        class="d-flex align-items-center gap-2 position-relative pe-4 slim-hide"
      >
        <h5 class="mb-0 chat-ai-label">Chat AI</h5>
        <a
          class="text-white opacity-50 p-0"
          style="font-size: 1.1rem; line-height: 1"
          [routerLink]="['/t/agente']"
          [queryParams]="{step: 1}"
          (click)="$event.stopPropagation()"
        >
        </a>
      </div>
    </div>

    <app-help-chat></app-help-chat>
  </div>
</div>
