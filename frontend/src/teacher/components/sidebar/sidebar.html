<div class="flex-fill w-100 card sidebar">
  <div
    class="sidebar-header d-flex align-items-center justify-content-center gap-2 mt-5 px-4"
  >
    <img
      src="/images/logo_primary_extended.png"
      alt="Syllex Logo"
      class="logo-extended"
      routerLink="/t/dashboard"
    />
    <img
      src="/images/logo_primary.png"
      alt="Syllex Logo"
      class="logo-slim"
      routerLink="/t/dashboard"
    />
  </div>

  <div class="w-100 px-3 py-4 d-flex flex-column flex-fill inner-content">
    <div
      id="mainRoutes"
      class="d-flex flex-column gap-2 flex-fill mt-4"
      style="overflow-y: auto; overflow-x: hidden"
    >
      @for(route of mainRoutes; track $index){
      <div
        class="sidebarRoute w-100 gap-2 d-flex py-3 px-4 align-items-center"
        [routerLink]="route.path"
        routerLinkActive="active"
        [tourAnchor]="route.tourAnchor || ''"
      >
        @switch (route.path) { @case ('dashboard') {
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="12" cy="12" r="9" />
          <path d="M12 7v5l3 2" />
        </svg>
        } @case ('tests') {
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <rect x="5" y="3" width="14" height="18" rx="2" />
          <path d="M9 8h6M9 12h6M9 16h3" />
        </svg>
        } @case ('banca') {
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <rect x="4" y="4" width="16" height="16" rx="2" />
          <path d="M8 9h8M8 13h5" />
        </svg>
        } @case ('classi') {
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="9" cy="9" r="3" />
          <path d="M3 20c0-3 2.5-5 6-5s6 2 6 5" />
          <circle cx="17" cy="9" r="2.5" />
          <path d="M16 15c3 0 5 2 5 5" />
        </svg>
        } @case ('risorse') {
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            d="M7 3h7l5 5v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"
          />
          <path d="M14 3v5h5" />
        </svg>
        } @case ('calendario') {
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <rect x="3" y="5" width="18" height="16" rx="2" />
          <path d="M3 9h18M8 3v4M16 3v4" />
        </svg>
        } }
        <span class="routeLabel slim-hide">{{route.label}}</span>
      </div>
      }
    </div>
    <!-- Help chat button -->
    <div class="mt-auto pt-2 d-flex flex-column gap-2">
      <div
        class="side-btn chat"
        (click)="navigateToLabAi()"
        tourAnchor="teacher-ai-lab"
      >
        <span class="slim-hide">Lab AI</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="#C8F23F" stroke-width="2">
          <path d="M9 3v5L5 14a4 4 0 0 0 3.5 6h7A4 4 0 0 0 19 14l-4-6V3" />
          <path d="M9 3h6" />
        </svg>
      </div>
      <div class="side-btn chat" routerLink="/t/agente">
        <span class="slim-hide">Chat AI</span>
        <svg viewBox="0 0 24 24" fill="#fff">
          <path d="M12 3l1.6 4L18 8.5l-4.4 1.5L12 14l-1.6-4L6 8.5 10.4 7z" />
          <path d="M18 13l.8 2 2 .8-2 .8-.8 2-.8-2-2-.8 2-.8z" />
        </svg>
      </div>
    </div>
  </div>
</div>
