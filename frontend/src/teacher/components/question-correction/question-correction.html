<div class="p-4 rounded-4 d-flex flex-column gap-2" style="background: #d2e2ff">
  <label class="form-label text-dark fw-bold fs-4">
    Domanda {{ index }}
    <span class="badge" [class]="data.answer.result">
      {{ getResultLabel(data.answer.result) }}
    </span>

    @if (isOpenTypeQuestion && !isReviewed) {<button
      (click)="correctWithAI()"
      class="btn btn-secondary btn-sm"
    >
      @if(aiCorrecting === true) {
      <fa-icon [icon]="spinner" [animation]="'spin'"></fa-icon>} Correzione IA</button
    >}
  </label>

  <p class="fs-5">{{ data.question.text }}</p>

  @if(data.question.imageUrl){
  <img
    [src]="data.question.imageUrl"
    class="img-fluid rounded-3 mb-3"
    style="max-height: 300px; width: auto"
  />
  } @if(data.question.options && data.question.options.length > 0){
  <div>
    <label class="form-label text-dark fw-bold">Opzioni:</label>
    <ol type="A" class="ps-3">
      @for(option of data.question.options; track $index){
      <li [class.correct]="option.isCorrect" [class.fw-bold]="option.isCorrect">
        {{ option.label }} @if(option.isCorrect) { (Corretta) }
      </li>
      }
    </ol>
  </div>
  }

  <section class="px-0 pb-0">
    <label
      class="form-label text-dark fw-bold d-flex align-items-center gap-2 mb-2"
    >
      Risposta dello studente: @if (data?.answer?.aiProbability !== null &&
      data?.answer?.aiProbability !== undefined) {
      <span
        class="badge"
        style="cursor: help"
        [ngClass]="{
          'bg-danger': data.answer.aiProbability > 50,
          'bg-primary': data.answer.aiProbability <= 50
        }"
        ngbTooltip="Indica quanto è probabile che questo testo sia stato scritto da un'intelligenza artificiale (es: ChatGPT)"
      >
        {{ getAiProbabilityLabel(data.answer.aiProbability) }}
      </span>
      }
    </label>
    <div class="d-flex flex-row align-items-start gap-3">
      <p class="mb-0 fs-5 flex-fill">{{ data?.answer?.answer || 'Nessuna risposta' }}</p>
      <div class="d-flex flex-column align-items-center flex-shrink-0" style="min-width: 90px">
        <label class="form-label text-dark fw-bold small mb-1">
          Punteggio (max {{ data.answer.maxScore }})
        </label>
        <input
          type="number"
          class="form-control border-0 bg-white rounded-3 shadow-none fs-4 text-center"
          [(ngModel)]="data.answer.score"
          [max]="data.answer.maxScore"
          min="0"
          step="0.5"
          [disabled]="isReviewed === true"
          (ngModelChange)="isOpenTypeQuestion ? onScoreChange($event) : null"
        />
      </div>
    </div>
  </section>

  <div>
    <label class="form-label text-dark fw-bold">Feedback per lo studente</label>
    <textarea
      class="form-control border-0 bg-white rounded-3 shadow-none"
      rows="4"
      [(ngModel)]="data.answer.feedback"
      placeholder="Inserisci un commento..."
      [disabled]="isReviewed === true"
    ></textarea>
  </div>
</div>
