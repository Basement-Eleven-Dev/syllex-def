<div class="voice-ui-container">
  <div class="status-header">
    <h2 class="status-title">{{ statusText }}</h2>
  </div>

  <div class="orb-area">
    <div class="ai-orb" [ngClass]="orbClass"></div>
  </div>

  <div class="controls-area">
    @if (!voice.isConnected()) {
    <button class="action-btn start-btn" (click)="start()">
      <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
        <path
          d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.39-.9.88 0 2.65-2.26 4.88-5.01 4.88s-5.01-2.23-5.01-4.88c0-.49-.41-.88-.9-.88s-.9.39-.9.88c0 3.2 2.45 5.86 5.56 6.31V21h2v-2.82c3.12-.45 5.56-3.1 5.56-6.31 0-.49-.41-.88-.9-.88z"
        />
      </svg>
    </button>
    } @else {
    <button class="action-btn stop-btn" (click)="stop()">
      <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
        <path d="M6 6h12v12H6z" />
      </svg>
    </button>
    }
  </div>
</div>
