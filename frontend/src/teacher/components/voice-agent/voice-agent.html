<div class="p-6 max-w-md mx-auto bg-white rounded-xl shadow-md space-y-4">
  <h2 class="text-xl font-bold">Assistente Vocale</h2>

  <div class="flex items-center space-x-2">
    <span class="text-sm">Stato:</span>
    @if (voice.isConnected()) {
    <span class="px-2 py-1 bg-green-100 text-green-800 text-xs rounded-full"
      >Connesso</span
    >
    } @else {
    <span class="px-2 py-1 bg-red-100 text-red-800 text-xs rounded-full"
      >Disconnesso</span
    >
    } @if (voice.isSpeaking()) {
    <span
      class="px-2 py-1 bg-blue-100 text-blue-800 text-xs rounded-full animate-pulse"
      >L'AI Parla</span
    >
    }
  </div>

  <div class="h-64 overflow-y-auto border p-4 rounded-lg bg-gray-50">
    @for (msg of voice.messages(); track $index) {
    <div [ngClass]="{'text-right': msg.sender === 'user', 'mb-2': true}">
      <span
        class="inline-block p-2 rounded-lg text-sm"
        [ngClass]="msg.sender === 'user' ? 'bg-blue-100' : 'bg-gray-200 border'"
      >
        {{ msg.text }}
      </span>
    </div>
    }
  </div>

  <div class="text-center">
    @if (!voice.isConnected()) {
    <button
      (click)="start()"
      class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700"
    >
      Avvia Microfono
    </button>
    } @else {
    <button
      (click)="stop()"
      class="bg-red-600 text-white px-4 py-2 rounded-md hover:bg-red-700"
    >
      Termina
    </button>
    }
  </div>
</div>
