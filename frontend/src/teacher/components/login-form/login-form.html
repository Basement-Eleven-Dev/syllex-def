@if (isStaging) {
<div class="alert alert-warning" role="alert">
  Sei su ambiente staging
</div>
}
<form [formGroup]="isMfaChallenge ? mfaCodeForm : loginForm"
  (ngSubmit)="isMfaChallenge ? onConfirmMfa() : (isChallenge ? onConfirmChallenge() : onSingIn())"
  class="d-flex flex-column gap-3">
  <h3 class="text-dark">
    {{ isMfaChallenge ? 'Verifica identità' : (isChallenge ? 'Attivazione Account' : 'Bentornato') }}
  </h3>
  <div [hidden]="isChallenge || isMfaChallenge">
    <label for="email" class="form-label text-dark">Email</label>
    <input type="text" class="form-control custom-input" placeholder="Email" formControlName="email" />
  </div>
  <div [hidden]="isMfaChallenge">
    <label for="password" class="form-label text-dark">Password</label>
    <div class="input-group input-group-custom">
      <input formControlName="password" [type]="showPassword ? 'text' : 'password'"
        class="form-control custom-input border-end-0" placeholder="Password" />
      <button class="btn btn-outline-secondary border-start-0 border-custom" type="button"
        (click)="showPassword = !showPassword">
        <fa-icon [icon]="showPassword ? EyeSlashIcon : EyeIcon"></fa-icon>
      </button>
    </div>
  </div>

  @if (isMfaChallenge) {
  <div>
    <label for="mfa-code" class="form-label text-dark">Codice dall'app (6 cifre)</label>
    <input [formControl]="mfaCodeForm.controls.code" type="text" id="mfa-code"
      class="form-control custom-input text-center fw-bold" placeholder="000000" maxlength="6" inputmode="numeric"
      autocomplete="one-time-code" />
  </div>
  } @if (!isChallenge && !isMfaChallenge) {
  <div class="text-end mb-4">
    <a href="#" class="text-dark fw-semibold" routerLink="/password-reset">Hai dimenticato la password?</a>
  </div>
  <div class="form-check">
    <input type="checkbox" class="form-check-input" id="privacyAccepted" formControlName="privacyAccepted" />
    <label class="form-check-label small text-dark" for="privacyAccepted">
      Dichiaro di aver preso visione della
      <a href="https://www.iubenda.com/privacy-policy/45755357" target="_blank" rel="noopener noreferrer"
        class="text-dark fw-semibold">Privacy Policy</a>
      relativa al trattamento dei dati personali.
    </label>
  </div>
  }
  <button type="submit" class="btn btn-gradient-primary btn-lg w-100"
    [disabled]="(isMfaChallenge ? mfaCodeForm.invalid : loginForm.invalid) || loading">
    <fa-icon [icon]="loading ? SpinnerIcon : LoginIcon" [animation]="loading ? 'spin' : undefined"></fa-icon>
    {{ isMfaChallenge ? 'Verifica' : (isChallenge ? 'Conferma e Accedi' :
    'Login') }}
  </button>
  @if(hasResult){
  <div class="alert text-center mt-4" [class.alert-success]="hasResult.success"
    [class.alert-danger]="!hasResult.success">
    {{ hasResult.message }}
  </div>
  }
</form>
