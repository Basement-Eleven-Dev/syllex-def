@if (isStaging) {
<div class="alert alert-warning" role="alert">Sei su ambiente staging</div>
}
<form
  [formGroup]="isMfaChallenge ? mfaCodeForm : loginForm"
  (ngSubmit)="submitAuthFlow()"
  class="d-flex flex-column gap-3"
>
  <h3 class="login-heading">
    {{ isMfaChallenge ? 'Verifica identità' : (isChallenge ? 'Attivazione
    Account' : 'Accedi') }}
  </h3>
  <div [hidden]="isChallenge || isMfaChallenge">
    <label for="email" class="form-label">Email</label>
    <input
      type="text"
      class="form-control custom-input"
      placeholder="email@syllex.com"
      formControlName="email"
    />
  </div>
  <div [hidden]="isMfaChallenge">
    <label for="password" class="form-label">Password</label>
    <div class="input-group input-group-custom">
      <input
        formControlName="password"
        [type]="showPassword ? 'text' : 'password'"
        class="form-control custom-input"
        placeholder="Minimo 8 caratteri"
      />
      <button
        class="btn border-custom"
        type="button"
        (click)="showPassword = !showPassword"
      >
        <fa-icon [icon]="showPassword ? EyeSlashIcon : EyeIcon"></fa-icon>
      </button>
    </div>
  </div>

  @if (isMfaChallenge) {
  <div>
    <label for="mfa-code" class="form-label fw-bold"
      >Codice dall'app (6 cifre)</label
    >
    <input
      [formControl]="mfaCodeForm.controls.code"
      type="text"
      id="mfa-code"
      class="form-control custom-input text-center fw-bold"
      placeholder="000000"
      maxlength="6"
      inputmode="numeric"
      autocomplete="one-time-code"
    />
  </div>
  } @if (!isChallenge && !isMfaChallenge) {
  <div class="text-start mb-4">
    <a href="#" class="fw-semibold text-dark" routerLink="/password-reset"
      >Hai dimenticato la password?</a
    >
  </div>
  <div class="form-check">
    <input
      type="checkbox"
      class="form-check-input"
      id="privacyAccepted"
      formControlName="privacyAccepted"
    />
    <label class="form-check-label small" for="privacyAccepted">
      Dichiaro di aver preso visione della
      <a
        href="https://www.iubenda.com/privacy-policy/45755357"
        target="_blank"
        rel="noopener noreferrer"
        class="fw-semibold"
        >Privacy Policy</a
      >
      relativa al trattamento dei dati personali.
    </label>
  </div>
  }
  <app-syllex-button
    [props]="{
      label: isMfaChallenge ? 'Verifica' : (isChallenge ? 'Conferma e accedi' : 'Accedi'),
      variant: 'primary',
      size: 'large',
      disabled: (isMfaChallenge ? mfaCodeForm.invalid : loginForm.invalid) || loading,
      leftIcon: loading ? SpinnerIcon : LoginIcon,
      animation: loading ? 'spin' : undefined
    }"
  ></app-syllex-button>
  @if(hasResult){
  <div
    class="alert text-center mt-4"
    [class.alert-success]="hasResult.success"
    [class.alert-danger]="!hasResult.success"
  >
    {{ hasResult.message }}
  </div>
  }
</form>
