<app-syllex-page-header
  title="Test disponibili"
  description="Qui trovi i test che puoi svolgere per le tue materie."
>
  <a
    class="btn btn-gradient-secondary btn-lg py-2 px-4"
    routerLink="/s/auto-evaluation/create"
  >
    Crea un test di autovalutazione
  </a>
</app-syllex-page-header>

<section class="d-flex flex-row flex-wrap mb-5 gap-3 align-items-center">
  <app-syllex-search-input
    placeholder="Cerca test..."
    [value]="SearchTerm()"
    (valueChange)="onSearchTermChange($event)"
    style="min-width: 260px; flex: 1 1 260px; max-width: 360px;"
  />

  <app-syllex-select-input
    placeholder="Tutte le materie"
    [value]="SelectedSubject()"
    [options]="SubjectOptions()"
    (valueChange)="onSubjectChange($event)"
    style="min-width: 180px; flex: 0 0 auto;"
  />

  <button
    type="button"
    class="btn btn-outline-danger rounded-pill px-3"
    (click)="clearFilters()"
    title="Pulisci filtri"
  >
    <fa-icon [icon]="ClearIcon"></fa-icon>
  </button>
</section>

<div class="row">
  @for (test of Tests(); track test._id) {
  <div class="col-12 col-lg-6 col-xl-4 mb-3">
    <app-student-test-card
      [Test]="test"
      [AttemptStatus]="getAttemptStatus(test._id)"
    />
  </div>
  } @empty {
  <div class="col-12">
    <div class="alert alert-info text-center">
      Nessun test disponibile al momento.
    </div>
  </div>
  }
</div>

<div
  class="mt-5 d-flex flex-row justify-content-between align-items-center mb-5"
>
  <app-syllex-pagination
    [collectionSize]="CollectionSize()"
    [page]="Page()"
    [pageSize]="PageSize()"
    (pageChange)="Page.set($event)"
  />

  <app-syllex-select-input
    [value]="PageSize().toString()"
    (valueChange)="PageSize.set(+$event); Page.set(1)"
    [options]="[
      { value: '5',  label: '5 per pagina' },
      { value: '10', label: '10 per pagina' },
      { value: '20', label: '20 per pagina' }
    ]"
    style="width: 160px;"
  />
</div>
