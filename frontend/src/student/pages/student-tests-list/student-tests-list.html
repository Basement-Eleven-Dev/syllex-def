<app-syllex-page-header
  title="Test disponibili"
  description="Qui trovi i test che puoi svolgere per le tue materie."
>
  <app-syllex-button
    [props]="{ label: 'Crea un test di autovalutazione', variant: 'primary', color: 'celestine', size: 'large', link: '/s/auto-evaluation/create', leftIcon: PlusIcon }"
  />
</app-syllex-page-header>

<section class="tests-filter-bar d-flex flex-row flex-wrap mb-5 gap-3 align-items-center">
  <app-syllex-search-input
    placeholder="Cerca test..."
    [value]="SearchTerm()"
    (valueChange)="onSearchTermChange($event)"
    style="min-width: 260px; flex: 1 1 260px; max-width: 360px"
  />

  <app-syllex-select-input
    placeholder="Tutte le materie"
    [value]="SelectedSubject()"
    [options]="SubjectOptions()"
    (valueChange)="onSubjectChange($event)"
    style="min-width: 180px; flex: 0 0 auto"
  />

  <div class="d-flex align-items-center gap-2 form-check form-switch cursor-pointer" style="cursor: pointer;">
    <input
      class="form-check-input student-switch"
      type="checkbox"
      role="switch"
      id="switchDaSvolgere"
      [checked]="ShowOnlyPending()"
      (change)="toggleDaFare()"
      style="width: 2.5rem; height: 1.25rem; cursor: pointer;"
    />
    <label class="form-check-label mb-0 text-white-50" for="switchDaSvolgere" style="font-size: 0.95rem; cursor: pointer; user-select: none;">
      Test da svolgere
    </label>
  </div>
</section>

<div class="stc-grid">
  @for (test of FilteredTests(); track test._id) {
  <app-student-test-card
    [Test]="test"
    [AttemptStatus]="getAttemptStatus(test._id)"
    [AttemptResult]="getAttemptResult(test._id)"
  />
  } @empty {
  <div class="col-12">
    <div class="alert alert-info text-center">
      Nessun test disponibile al momento.
    </div>
  </div>
  }
</div>

@if (IsLoadingMore()) {
<div class="d-flex justify-content-center align-items-center py-4 w-100">
  <fa-icon
    [icon]="SpinnerIcon"
    [animation]="'spin'"
    [size]="'2x'"
    class="text-primary animate-spin"
  ></fa-icon>
</div>
}

@if (!ShowOnlyPending()) {
<div
  class="pagination-row mt-5 d-flex flex-row justify-content-between align-items-center mb-5"
>
  <app-syllex-pagination
    [collectionSize]="CollectionSize()"
    [page]="Page()"
    [pageSize]="PageSize()"
    (pageChange)="Page.set($event)"
  />

  <app-syllex-select-input
    [value]="PageSize().toString()"
    (valueChange)="PageSize.set(+$event); Page.set(1)"
    [options]="[
      { value: '8',  label: '8 per pagina' },
      { value: '16', label: '16 per pagina' },
      { value: '24', label: '24 per pagina' }
    ]"
    style="width: 160px"
  />
</div>
}
