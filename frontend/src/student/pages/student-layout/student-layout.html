<app-help-chat></app-help-chat>

<div
  class="student-theme w-100 dvh-100 d-flex flex-row overflow-hidden"
  style="background-color: var(--student-bg); color: #fff"
>
  <div
    class="sidebar-overlay"
    [class.active]="sidebarOpen()"
    (click)="closeSidebar()"
  ></div>

  <!-- Hide sidebar on mobile/tablet (d-none d-lg-flex) -->
  <app-student-sidebar
    #sidebarRef
    [open]="sidebarOpen()"
    (toggleSidebar)="toggleSidebar()"
    class="d-none d-lg-flex"
  ></app-student-sidebar>

  <div id="content" class="flex-fill d-flex flex-column" style="min-width: 0">
    
    <!-- Mobile Sticky Top Header -->
    <div class="student-mobile-header d-flex d-lg-none justify-content-between align-items-center px-4 py-3">
      <img
        src="/images/logotipo.svg"
        alt="Syllex Logo"
        style="height: 28px; width: auto;"
        routerLink="/s/dashboard"
      />
      <div class="d-flex align-items-center gap-2">
        <span class="small fw-semibold" style="color: #c084fc;">{{ User()?.firstName || User()?.username || 'Studente' }}</span>
        <button class="btn d-flex align-items-center justify-content-center border-0 p-0 rounded-circle text-white btn-mobile-menu-grip" style="width: 38px; height: 38px; background-color: #252bb1; transition: transform 0.2s ease;" (click)="toggleMobileMenu()">
          <fa-icon [icon]="GripIcon" style="font-size: 0.95rem;"></fa-icon>
        </button>
      </div>
    </div>

    <!-- Desktop Navigation -->
    <div class="px-3 px-md-5 pt-4 d-none d-lg-block">
      <app-student-nav></app-student-nav>
    </div>

    <!-- Main Content Area -->
    <div
      class="flex-fill d-flex flex-column"
      style="overflow-y: auto; overflow-x: hidden; min-width: 0"
      (scroll)="onContentScroll($event)"
    >
      <div
        class="px-md-5 flex-grow-1 d-flex flex-column px-3 py-4"
        style="
          min-height: 0;
          min-width: 0;
          view-transition-name: student-content;
        "
      >
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</div>

<!-- Full-screen Mobile Menu Overlay -->
<div class="mobile-menu-overlay d-lg-none" [class.active]="mobileMenuOpen()">
  <div class="mobile-menu-header d-flex justify-content-between align-items-center px-4 py-3">
    <img
      src="/images/logotipo.svg"
      alt="Syllex Logo"
      style="height: 28px; width: auto;"
      (click)="closeMobileMenu()"
    />
    <button class="btn btn-close-menu d-flex align-items-center justify-content-center" (click)="closeMobileMenu()">
      <fa-icon [icon]="XmarkIcon" class="text-white fs-5"></fa-icon>
    </button>
  </div>
  
  <div class="mobile-menu-content d-flex flex-column px-4 py-5 flex-grow-1 justify-content-between">
    <div>
      <div class="user-greeting mb-5">
        <span class="greeting-subtitle">Studente</span>
        <h1 class="greeting-title fw-semibold">
          {{ User()?.firstName || User()?.username || 'Studente' }}
        </h1>
      </div>
      
      <div class="mobile-nav-routes d-flex flex-column gap-3">
        @for(route of mainRoutes; track $index) {
          <a
            [routerLink]="route.path"
            routerLinkActive="active"
            (click)="closeMobileMenu()"
            class="mobile-nav-route-item d-flex align-items-center gap-3 text-decoration-none"
          >
            <fa-icon [icon]="route.icon" class="route-icon"></fa-icon>
            <span class="route-label">{{ route.label }}</span>
          </a>
        }
        <!-- Chat AI / Tutor AI -->
        <a
          routerLink="/s/agente"
          routerLinkActive="active"
          (click)="closeMobileMenu()"
          class="mobile-nav-route-item d-flex align-items-center gap-3 text-decoration-none"
        >
          <fa-icon [icon]="RobotIcon" class="route-icon"></fa-icon>
          <span class="route-label">Tutor AI</span>
        </a>
      </div>
    </div>
    
    <div class="mobile-menu-footer d-flex justify-content-between align-items-center mt-auto pt-5">
      <div ngbDropdown placement="top-start" class="flex-fill">
        <button
          class="mobile-footer-btn d-flex align-items-center gap-2 border-0 bg-transparent p-0 text-white opacity-75"
          ngbDropdownToggle
        >
          <fa-icon [icon]="UserProfileIcon" class="fs-5"></fa-icon>
          <span>Profilo</span>
        </button>
        <div
          ngbDropdownMenu
          class="p-3 dropdown-menu-dark"
          style="min-width: 240px"
        >
          <app-student-user-contextual-menu></app-student-user-contextual-menu>
        </div>
      </div>
      
      <button class="mobile-footer-btn d-flex align-items-center gap-2 text-danger border-0 bg-transparent ms-auto p-0" (click)="onLogout()">
        <fa-icon [icon]="LogoutIcon" class="fs-5"></fa-icon>
        <span>Logout</span>
      </button>
    </div>
  </div>
</div>
