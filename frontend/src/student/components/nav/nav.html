<ng-container *transloco="let t; read: 'student_layout'">
  <nav class="navbar-student">
    <div class="navbar-student__container">
      <div
        class="navbar-student__logo"
        routerLink="/s/dashboard"
        (click)="closeMenu()"
      >
        <img src="/images/logotipo.svg" alt="Syllex Logo" height="40" />
      </div>

      <!-- Desktop links (≥992px) -->
      <div class="navbar-student__links">
        @for(route of routes; track $index){
        <a
          [routerLink]="route.route"
          class="navbar-student__link"
          [routerLinkActive]="'active'"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <fa-icon
            [fixedWidth]="true"
            [icon]="route.icon"
            class="navbar-student__link-icon"
          ></fa-icon>
          <span class="navbar-student__link-label"
            >{{ t('routes.' + route.labelKey) }}</span
          >
        </a>
        }
      </div>

      <div class="navbar-student__actions">
        <!-- Logout button: icon-only on tablet/mobile, icon+label on desktop -->
        <a class="navbar-student__logout" (click)="onLogout()">
          <fa-icon
            [icon]="LogoutIcon"
            class="navbar-student__logout-icon"
          ></fa-icon>
          <span class="navbar-student__logout-label"
            >{{ t('nav.logout') }}</span
          >
        </a>

        <!-- Hamburger toggle (hidden on desktop) -->
        <button
          class="navbar-student__hamburger"
          (click)="toggleMenu()"
          [attr.aria-expanded]="menuOpen()"
          [attr.aria-label]="t('nav.aria_open_menu')"
        >
          <fa-icon [icon]="menuOpen() ? XmarkIcon : BarsIcon"></fa-icon>
        </button>
      </div>
    </div>
  </nav>

  <!-- Mobile/tablet overlay -->
  @if(menuOpen()){
  <div class="navbar-student__overlay" (click)="closeMenu()"></div>

  <!-- Side drawer -->
  <div
    class="navbar-student__drawer"
    role="dialog"
    [attr.aria-label]="t('nav.aria_nav_menu')"
  >
    <div class="navbar-student__drawer-header">
      <img src="/images/logotipo.svg" alt="Syllex Logo" height="36" />
      <button
        class="navbar-student__drawer-close"
        (click)="closeMenu()"
        [attr.aria-label]="t('nav.aria_close_menu')"
      >
        <fa-icon [icon]="XmarkIcon"></fa-icon>
      </button>
    </div>

    <nav class="navbar-student__drawer-nav">
      @for(route of routes; track $index){
      <a
        [routerLink]="route.route"
        class="navbar-student__drawer-link"
        [routerLinkActive]="'active'"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeMenu()"
      >
        <fa-icon
          [fixedWidth]="true"
          [icon]="route.icon"
          class="navbar-student__drawer-icon"
        ></fa-icon>
        <span>{{ t('routes.' + route.labelKey) }}</span>
      </a>
      }
    </nav>

    <div class="navbar-student__drawer-footer">
      <a class="navbar-student__drawer-logout" (click)="onLogout()">
        <fa-icon [icon]="LogoutIcon"></fa-icon>
        <span>{{ t('nav.logout') }}</span>
      </a>
    </div>
  </div>
  }
</ng-container>
