<div class="ctc" [routerLink]="Route()">

  <!-- ── Left: title, badge, metadata ─────────────────────────────────────── -->
  <div class="ctc__info">
    <div class="ctc__title-row">
      <h6 class="ctc__title">{{ Test().name }}</h6>
      @if (!AttemptStatus()) {
        <span class="ctc__badge-new">Nuovo</span>
      }
    </div>
    <div class="ctc__meta">
      <span class="ctc__meta-item">
        <fa-icon [icon]="QuestionsIcon" class="ctc__meta-icon"></fa-icon>
        {{ QuestionsCount() }} domande
      </span>
      <span class="ctc__meta-item">
        <fa-icon [icon]="TrophyIcon" class="ctc__meta-icon"></fa-icon>
        {{ MaxScore() }} punti
      </span>
      @if (Test().availableTo) {
        <span class="ctc__meta-date">{{ Test().availableTo | date: 'dd.MM.yyyy' }}</span>
      }
    </div>
  </div>

  <!-- ── Right: score badge + action button ────────────────────────────────── -->
  <div class="ctc__actions">
    @if (ShowScore()) {
      <div class="ctc__score">
        <fa-icon [icon]="TrophyIcon" class="ctc__score-icon"></fa-icon>
        <span class="ctc__score-value">
          {{ AttemptScore()!.score }} / {{ AttemptScore()!.maxScore }} pt
        </span>
      </div>
    }
    <button
      class="ctc__btn"
      [class.ctc__btn--pending]="!AttemptStatus()"
      [class.ctc__btn--in-progress]="AttemptStatus() === 'in-progress'"
      [class.ctc__btn--completed]="IsCompleted()"
      (click)="$event.stopPropagation(); $event.preventDefault()"
    >
      @if (AttemptStatus() === 'reviewed' || AttemptStatus() === 'delivered') {
        <fa-icon [icon]="ReviewIcon"></fa-icon> Rivedi
      } @else if (AttemptStatus() === 'in-progress') {
        <fa-icon [icon]="ResumeIcon"></fa-icon> Riprendi
      } @else {
        <fa-icon [icon]="PlayIcon"></fa-icon> Compila
      }
    </button>
  </div>

</div>
