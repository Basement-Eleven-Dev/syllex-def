<nav
  class="student-nav py-3 px-4 d-flex flex-row align-items-center justify-content-between container-fluid rounded-4"
>
  <div class="d-flex flex-row gap-3 align-items-center">
    <button
      class="btn date-btn bg-transparent flex-shrink-0 text-white opacity-75"
      style="border: none; pointer-events: none;"
    >
      <span>{{ now | date: 'EEE,' }}</span>
      <span class="fw-bold mx-1 text-white">{{ now | date: 'd MMMM' | titlecase }}</span>
      <span>{{ now | date: 'yyyy' }}</span>
    </button>
  </div>

  <div class="d-flex flex-row align-items-center gap-4">
    <div ngbDropdown class="d-inline-block">
      <div
        id="studentProfileDropdown"
        ngbDropdownToggle
        class="d-flex flex-row align-items-center gap-2 h-100 cursor-pointer"
      >
        <a class="d-flex align-items-center justify-content-center text-white p-0 text-decoration-none">
          @if (getInitals() | async; as initials) {
            <div class="avatar-circle">
              {{ initials }}
            </div>
          } @else {
            <fa-icon
              [icon]="UserProfileIcon"
              class="text-white"
              [size]="'3x'"
            ></fa-icon>
          }
        </a>
      </div>
      <div
        ngbDropdownMenu
        aria-labelledby="studentProfileDropdown"
        class="p-3 dropdown-menu dropdown-menu-dark"
      >
        <app-student-user-contextual-menu></app-student-user-contextual-menu>
      </div>
    </div>
  </div>
</nav>
