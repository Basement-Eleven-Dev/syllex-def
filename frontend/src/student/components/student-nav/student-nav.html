<ng-container *transloco="let t; read: 'student_layout'">
  <nav
    class="student-nav py-3 px-4 d-flex flex-row align-items-center justify-content-between container-fluid rounded-4"
  >
    <div class="d-flex flex-row gap-3 align-items-center">
      <button
        class="btn date-btn bg-transparent flex-shrink-0 text-white opacity-75"
        style="border: none; pointer-events: none"
      >
        <span>{{ now | date: 'EEE,' }}</span>
        <span class="fw-bold mx-1 text-white"
          >{{ now | date: 'd MMMM' | titlecase }}</span
        >
        <span>{{ now | date: 'yyyy' }}</span>
      </button>

      @if (isAgentRoute()) {
      <div style="min-width: 240px">
        <app-syllex-select-input
          [options]="subjectOptions()"
          [value]="materiaService.materiaSelected()?._id || ''"
          (valueChange)="onSubjectChange($event)"
          [placeholder]="t('nav.select_subject')"
        ></app-syllex-select-input>
      </div>
      }
    </div>

    <div class="d-flex flex-row align-items-center gap-4">
      <div
        class="rounded-pill d-flex align-items-center gap-2 px-3 py-2"
        style="
          background: rgba(255, 255, 255, 0.1);
          border: 1px solid rgba(255, 255, 255, 0.2);
          cursor: pointer;
          transition: all 0.2s ease;
        "
        (click)="toggleHelpChat(); $event.stopPropagation()"
        onmouseover="this.style.background = 'rgba(255, 255, 255, 0.15)'"
        onmouseout="this.style.background = 'rgba(255, 255, 255, 0.1)'"
      >
        <span
          class="d-none d-xl-inline slim-hide"
          style="
            color: #ffffff;
            font-weight: 500;
            font-size: 0.85rem;
            white-space: nowrap;
          "
          >{{ t('nav.help') }}</span
        >
      </div>

      <app-language-selector></app-language-selector>

      <div ngbDropdown class="d-inline-block">
        <div
          id="studentProfileDropdown"
          ngbDropdownToggle
          class="d-flex flex-row align-items-center gap-2 h-100 cursor-pointer"
        >
          <a
            class="d-flex align-items-center justify-content-center text-white p-0 text-decoration-none"
          >
            @if (getInitals() | async; as initials) {
            <div class="avatar-circle">{{ initials }}</div>
            } @else {
            <fa-icon
              [icon]="UserProfileIcon"
              class="text-white"
              [size]="'3x'"
            ></fa-icon>
            }
          </a>
        </div>
        <div
          ngbDropdownMenu
          aria-labelledby="studentProfileDropdown"
          class="p-3 dropdown-menu dropdown-menu-dark"
        >
          <app-student-user-contextual-menu></app-student-user-contextual-menu>
        </div>
      </div>
    </div>
  </nav>
</ng-container>
